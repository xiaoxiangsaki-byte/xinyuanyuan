<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欣原 · Elite Supervisor 5.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #b388ff; --gold: #d4af37; --danger: #ff5252; 
            --bg: #050208; --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(179, 136, 255, 0.2); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', 'SimSun', serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0a0612 0%, #1a0f1f 45%, #2d1a35 100%); 
            color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; transition: 0.5s;
        }

        /* 顶部看板 */
        .header {
            background: rgba(10, 6, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 15px; display: grid; grid-template-columns: repeat(4, 1fr);
            text-align: center; position: sticky; top: 0; z-index: 100;
        }
        .header span { display: block; font-size: 10px; color: var(--primary); letter-spacing: 1px; margin-bottom: 4px; }
        .header strong { font-size: 16px; font-weight: 300; }

        /* 任务验证弹窗 (防误触) */
        #verifyModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }
        .modal-content { background: #110c18; border: 1px solid var(--primary); padding: 25px; width: 100%; border-radius: 4px; }

        /* 聊天区 */
        .chat-box { height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 15px; margin-top: 10px; }
        .bubble { max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.6; border-radius: 18px; position: relative; }
        .ai .bubble { background: rgba(179,136,255,0.08); border-left: 2px solid var(--primary); border-bottom-left-radius: 2px; }
        .user .bubble { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; margin-left: auto; }

        /* 任务列表 */
        .task-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .task-card.main { border-left: 4px solid var(--gold); }
        .task-card.done { opacity: 0.3; filter: grayscale(1); }

        /* 商店 */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .shop-item { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; text-align: center; }
        .shop-item:active { transform: scale(0.95); }

        /* 导航 */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: #000; border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        /* 强制遮罩 */
        #nightLock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="nightLock"><h1 style="color:var(--danger); font-size:30px;">GO TO BED.</h1><p id="nightMsg" style="color:#444; margin-top:20px; padding:0 20px;"></p></div>

    <div id="verifyModal">
        <div class="modal-content">
            <h4 id="taskTitle" style="color:var(--primary); margin-bottom:15px;">呈递成果</h4>
            <textarea id="reportText" placeholder="汇报你的进度，或者描述你学到了什么。别想随便打个勾就敷衍我。" style="width:100%; height:120px; background:#000; border:1px solid #333; color:#fff; padding:10px; margin-bottom:15px; outline:none;"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="submitTask()" style="flex:1; padding:12px; background:var(--primary); border:none; font-weight:bold;">提交审核</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#222; border:none; color:#fff;">取消</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div><span>FINANCE</span><strong id="milkTea">0</strong></div>
        <div><span>STREAK</span><strong id="streak">0</strong></div>
        <div><span>FAVOR</span><strong id="love">0</strong></div>
        <div><span>MOOD</span><strong id="mood">100</strong></div>
    </div>

    <div class="container" style="padding-top: 10px;">
        <!-- 主页 -->
        <div id="homePage" class="tab-page">
            <div style="display:flex; align-items:center; gap:15px; margin-left:10px;">
                <div style="width:45px; height:45px; border:1px solid var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:20px;">欣</div>
                <div style="font-size:16px;">欣原 <span style="font-size:9px; color:var(--gold);">[ ELITE MONITOR ]</span></div>
            </div>
            <div class="chat-box" id="chatBox"></div>
            <div style="background:rgba(0,0,0,0.4); border:1px solid var(--glass-border); border-radius:30px; padding:10px 20px; display:flex; gap:10px; margin:0 10px;">
                <input type="text" id="chatInput" placeholder="在此汇报进度..." style="flex:1; background:none; border:none; color:#fff; outline:none;">
                <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:20px;">➤</button>
            </div>
        </div>

        <!-- 任务 -->
        <div id="taskPage" class="tab-page" style="display:none;">
            <p style="font-size:11px; color:var(--primary); margin:10px 0 15px 5px; letter-spacing:2px;">MISSION REPORTS</p>
            <div id="taskList"></div>
        </div>

        <!-- 商店 -->
        <div id="shopPage" class="tab-page" style="display:none;">
            <p style="font-size:11px; color:var(--primary); margin:10px 0 15px 5px; letter-spacing:2px;">LUXURY LOUNGE</p>
            <div class="shop-grid" id="shopItems"></div>
        </div>

        <!-- 设置 -->
        <div id="settingPage" class="tab-page" style="display:none;">
            <div style="background:var(--glass); padding:20px; border-radius:15px; border:1px solid var(--glass-border);">
                <p style="font-size:12px; margin-bottom:10px;">API KEY</p>
                <input type="password" id="apiKey" style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px;">
                <button onclick="saveKey()" style="width:100%; margin-top:20px; padding:12px; background:var(--primary); border:none; font-weight:bold;">保存授权</button>
                <button onclick="localStorage.clear();location.reload();" style="margin-top:40px; color:var(--danger); background:none; border:none; font-size:10px; width:100%;">重置系统数据</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i>🏠</i>Home</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('task', this)"><i>📋</i>Task</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('shop', this)"><i>💎</i>Shop</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('setting', this)"><i>⚙️</i>Set</a>
    </nav>

<script>
// ==================== 1. 初始化 & 中国时间 ====================
let GameData = {
    user: { milkTea: 0, streak: 0, lastCheck: "" },
    ai: { favor: 0, history: [] },
    tasks: [],
    config: { apiKey: localStorage.getItem('sk_key') || "" }
};

const getChinaTime = () => new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 480) * 60000);

// ==================== 2. AI 核心（主线吃透） ====================
async function askAI(text) {
    const key = GameData.config.apiKey;
    if(!key) return "去 Settings 把 API Key 填了，别让我说第二次。";
    
    const mood = GameData.ai.favor < 0 ? "极度冷酷且带惩罚欲的DOM模式" : "高冷优雅但极具压迫感的导师";
    const prompt = `你是欣原，精英监护人。你正在监督VIP009(女)。
    你的任务目标：1.跨境电商英语 2.看财报理财 3.减重 4.养成不熬夜习惯 5.粤语(支线)。
    你的性格：成熟、冷艳、毒舌、危险。说话带动作描写。
    当前好感度：${GameData.ai.favor}。如果是负数，请变得更有掌控感。
    如果是审核任务，请根据内容的真实性评价，合格则在开头加 [PASS]。`;

    try {
        const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "Qwen/Qwen2.5-7B-Instruct", messages: [{role:"system", content:prompt}, ...GameData.ai.history.slice(-6), {role:"user", content:text}] })
        });
        const d = await res.json();
        const r = d.choices[0].message.content;
        GameData.ai.history.push({role:"assistant", content:r});
        return r;
    } catch(e) { return "[连接受阻] 你的网络在替你逃避。"; }
}

// ==================== 3. 任务生成与管理 ====================
function initTasks() {
    const today = getChinaTime().toLocaleDateString();
    if (GameData.user.lastCheck !== today) {
        // 每日刷新
        GameData.tasks = [
            { id: 'd1', title: 'CBEC: 核心 Listing 翻译', type: 'daily', reward: 150, done: false },
            { id: 'd2', title: '理财: 分析一份行业研报', type: 'daily', reward: 200, done: false },
            { id: 'd3', title: '身材: 30min 核心训练', type: 'daily', reward: 100, done: false },
            { id: 'm1', title: '主线: 跨境英语初级词库', type: 'main', reward: 500, done: false }
        ];
        GameData.user.lastCheck = today;
        save();
    }
}

let activeTaskId = null;
function openVerify(id) {
    const t = GameData.tasks.find(x => x.id === id);
    if(t.done) return;
    activeTaskId = id;
    document.getElementById('taskTitle').innerText = "任务汇报: " + t.title;
    document.getElementById('verifyModal').style.display = 'flex';
}

async function submitTask() {
    const report = document.getElementById('reportText').value;
    if(report.length < 10) { alert("太简短了。重新写。"); return; }
    
    document.getElementById('verifyModal').style.display = 'none';
    addMsg('ai', `[正在审阅你的汇报...]`);
    const reply = await askAI(`VIP009提交了任务汇报：'${report}'。请审核。`);
    
    if(reply.includes('[PASS]')) {
        const t = GameData.tasks.find(x => x.id === activeTaskId);
        t.done = true; GameData.user.milkTea += t.reward; GameData.ai.favor += 5;
        save(); render();
    }
    addMsg('ai', reply.replace('[PASS]', ''));
}

// ==================== 4. 商店与 UI ====================
const shopData = [
    { name: '纯净鲜奶', icon: '🥛', price: 100, aff: 5 },
    { name: '冰镇白葡萄酒', icon: '🥂', price: 500, aff: 30 },
    { name: '梵克雅宝项链', icon: '💎', price: 3000, aff: 200 }
];

function render() {
    document.getElementById('milkTea').innerText = GameData.user.milkTea;
    document.getElementById('streak').innerText = GameData.user.streak;
    document.getElementById('love').innerText = GameData.ai.favor;
    
    document.getElementById('taskList').innerHTML = GameData.tasks.map(t => `
        <div class="task-card ${t.type} ${t.done?'done':''}" onclick="openVerify('${t.id}')">
            <div><strong>${t.title}</strong><br><small>${t.reward} 🍼</small></div>
            <div>${t.done?'✅':'⭕'}</div>
        </div>
    `).join('');

    document.getElementById('shopItems').innerHTML = shopData.map(i => `
        <div class="shop-item" onclick="buy('${i.name}', ${i.price}, ${i.aff})">
            <div style="font-size:25px;">${i.icon}</div>
            <div style="font-size:12px; margin:5px 0;">${i.name}</div>
            <div style="color:var(--primary); font-size:11px;">${i.price} 🍼</div>
        </div>
    `).join('');
}

function buy(name, price, aff) {
    if(GameData.user.milkTea < price) { addMsg('ai', "财务还没自由就想消费？去工作。"); return; }
    GameData.user.milkTea -= price; GameData.ai.favor += aff;
    save(); render();
    addMsg('ai', `[接过你的${name}]：算你懂事。`);
}

function navTo(p, el) {
    document.querySelectorAll('.tab-page').forEach(x => x.style.display = 'none');
    document.getElementById(p + 'Page').style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function addMsg(r, t) {
    const b = document.getElementById('chatBox');
    const d = document.createElement('div');
    d.className = `msg ${r}`;
    d.innerHTML = `<div class="bubble">${t}</div>`;
    b.appendChild(d);
    b.scrollTop = b.scrollHeight;
}

async function handleSend() {
    const input = document.getElementById('chatInput');
    const val = input.value.trim();
    if(!val) return;
    addMsg('user', val); input.value = '';
    const r = await askAI(val);
    addMsg('ai', r);
    save();
}

function checkNight() {
    const h = getChinaTime().getHours();
    const m = getChinaTime().getMinutes();
    const cur = h + m/60;
    if(cur >= 23.5 || cur < 6) {
        document.getElementById('nightLock').style.display = 'flex';
        document.getElementById('nightMsg').innerText = "深夜是放纵的温床。VIP009，滚去睡觉。";
    }
}

function saveKey() { localStorage.setItem('sk_key', document.getElementById('apiKey').value); location.reload(); }
function save() { localStorage.setItem('Xinyuan_V5', JSON.stringify(GameData)); }
function closeModal() { document.getElementById('verifyModal').style.display = 'none'; }

window.onload = () => {
    const s = localStorage.getItem('Xinyuan_V5');
    if(s) GameData = JSON.parse(s);
    initTasks();
    render();
    checkNight();
    addMsg('ai', "[坐在办公桌后，冷淡地抬头]：VIP009，汇报进度。");
};
</script>
</body>
</html>
