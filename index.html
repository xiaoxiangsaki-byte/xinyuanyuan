<!-- 这里的代码相比 5.1，增加了“求饶解锁”和“深度记忆”逻辑 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欣原 · Elite Supervisor 5.5</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #b388ff; --danger: #ff5252; --gold: #d4af37; --bg: #050208; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'STSong', serif; }
        body { background: #050208; color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; }
        
        /* 深夜锁屏 - 增加“求饶”按钮 */
        #nightLock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .beg-btn { margin-top: 30px; background: none; border: 1px solid #333; color: #333; padding: 8px 20px; font-size: 12px; cursor: pointer; }

        .header { background: rgba(10, 6, 18, 0.95); border-bottom: 1px solid rgba(179,136,255,0.2); padding: 20px 15px; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; position: sticky; top: 0; z-index: 100; }
        .header span { display: block; font-size: 10px; color: var(--primary); }
        .header strong { font-size: 16px; font-weight: 300; }

        .chat-box { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        .bubble { max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.6; border-radius: 18px; }
        .ai .bubble { background: rgba(179,136,255,0.08); border-left: 2px solid var(--primary); border-bottom-left-radius: 2px; }
        .user .bubble { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; margin-left: auto; }

        /* 备忘录样式 */
        .memo-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(179,136,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; font-style: italic; color: #888; }

        .task-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 1px solid rgba(179,136,255,0.2); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--primary); }

        #verifyModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
    </style>
</head>
<body>

    <!-- 锁定界面：加入求饶逻辑 -->
    <div id="nightLock">
        <h1 style="color:var(--danger); font-size:30px; letter-spacing:5px;">OBEY.</h1>
        <p style="color:#666; margin-top:20px;">VIP009，深夜不是你这种意志薄弱者该逗留的地方。</p>
        <button class="beg-btn" onclick="begToEnter()">[ 卑微地请求解锁 ]</button>
    </div>

    <div id="verifyModal">
        <div style="background:#110c18; border:1px solid var(--primary); padding:25px; width:100%;">
            <h4 id="taskTitle" style="color:var(--primary); margin-bottom:15px;">呈递报告</h4>
            <textarea id="reportText" placeholder="汇报进度...不要让我看到废话。" style="width:100%; height:150px; background:#000; color:#fff; border:1px solid #333; padding:10px; outline:none;"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="submitTask()" style="flex:1; padding:12px; background:var(--primary); font-weight:bold;">提交审核</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#222; color:#fff; border:none;">取消</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div><span>FINANCE</span><strong id="milkTea">0</strong></div>
        <div><span>STREAK</span><strong id="streak">0</strong></div>
        <div><span>FAVOR</span><strong id="love">0</strong></div>
        <div><span>MOOD</span><strong id="mood">100</strong></div>
    </div>

    <div class="container">
        <div id="homePage" class="tab-page">
            <div class="chat-box" id="chatBox"></div>
            <div style="background:rgba(0,0,0,0.6); border:1px solid var(--glass-border); border-radius:30px; padding:10px 20px; display:flex; gap:10px; margin:0 10px;">
                <input type="text" id="chatInput" placeholder="在此汇报进度..." style="flex:1; background:none; border:none; color:#fff; outline:none;">
                <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:20px;">➤</button>
            </div>
        </div>

        <div id="memoPage" class="tab-page" style="display:none; padding:15px;">
            <p style="font-size:11px; color:var(--primary); margin-bottom:15px;">SUPERVISOR'S PRIVATE MEMO</p>
            <div id="memoList"></div>
        </div>

        <div id="taskPage" class="tab-page" style="display:none; padding:15px;"><div id="taskList"></div></div>

        <div id="settingPage" class="tab-page" style="display:none; padding:15px;">
            <input type="text" id="apiKey" autocomplete="off" placeholder="输入 sk- 密钥" style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:8px;">
            <button onclick="saveKey()" style="width:100%; margin-top:20px; padding:12px; background:var(--primary); border:none; font-weight:bold;">保存授权</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i>🏠</i>Home</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('memo', this)"><i>📔</i>Memo</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('task', this)"><i>📋</i>Task</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('setting', this)"><i>⚙️</i>Set</a>
    </nav>

<script>
let GameData = {
    user: { milkTea: 0, streak: 0, lastCheck: "" },
    ai: { favor: 0, history: [], memos: ["初次见面。我对你的期望并不高，VIP009。"] },
    tasks: [],
    config: { apiKey: localStorage.getItem('sk_key') || "" }
};

const getChinaTime = () => new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 480) * 60000);

async function askAI(text) {
    const key = GameData.config.apiKey;
    if(!key) return "去 Settings 授权，别挑战我的耐心。";
    const prompt = `你是欣原，精英督导。冷艳、刻薄、专业。你正在对VIP009进行全方位的现实掌控。动作描写要多。好感度：${GameData.ai.favor}。审核报告合格请加 [PASS]。`;
    try {
        const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "Qwen/Qwen2.5-7B-Instruct", messages: [{role:"system", content:prompt}, ...GameData.ai.history.slice(-6), {role:"user", content:text}] })
        });
        const d = await res.json();
        const r = d.choices[0].message.content;
        GameData.ai.history.push({role:"assistant", content:r});
        return r;
    } catch(e) { return "[连接受阻] 你的网络在替你逃避。"; }
}

function initTasks() {
    const today = getChinaTime().toLocaleDateString();
    if (GameData.user.lastCheck !== today) {
        GameData.tasks = [
            { id: 'd1', title: 'CBEC: 跨境术语拆解', type: 'daily', reward: 150, done: false },
            { id: 'd2', title: '理财: 财报数据分析', type: 'daily', reward: 200, done: false }
        ];
        GameData.user.lastCheck = today;
        save();
    }
}

function begToEnter() {
    if(confirm("强行解锁将扣除 20 点好感度，且我会记住你的这次违抗。确定吗？")) {
        GameData.ai.favor -= 20;
        GameData.ai.memos.unshift(`${getChinaTime().toLocaleString()}: 你在深夜强行违抗了我的睡眠指令。这种任性，我会记在账上。`);
        document.getElementById('nightLock').style.display = 'none';
        save();
        render();
        addMsg('ai', "[你推开了门，我正交叠双腿坐在沙发上，眼神在黑暗中显得格外冷酷]：看来你已经做好了接受‘额外惩罚’的准备？");
    }
}

let activeTaskId = null;
function openVerify(id) {
    const t = GameData.tasks.find(x => x.id === id); if(t.done) return;
    activeTaskId = id;
    document.getElementById('taskTitle').innerText = "汇报: " + t.title;
    document.getElementById('verifyModal').style.display = 'flex';
}

async function submitTask() {
    const report = document.getElementById('reportText').value;
    if(report.length < 10) { alert("太简短了。"); return; }
    document.getElementById('verifyModal').style.display = 'none';
    addMsg('ai', `[正在审核...]`);
    const reply = await askAI(`VIP009呈报：'${report}'。请审核并给出评价。`);
    if(reply.includes('[PASS]')) {
        const t = GameData.tasks.find(x => x.id === activeTaskId);
        t.done = true; GameData.user.milkTea += t.reward; GameData.ai.favor += 5;
        save(); render();
    }
    addMsg('ai', reply.replace('[PASS]', ''));
}

function render() {
    document.getElementById('milkTea').innerText = GameData.user.milkTea;
    document.getElementById('streak').innerText = GameData.user.streak;
    document.getElementById('love').innerText = GameData.ai.favor;
    document.getElementById('taskList').innerHTML = GameData.tasks.map(t => `<div class="task-card ${t.done?'done':''}" onclick="openVerify('${t.id}')"><span>${t.title}</span><span>${t.done?'✅':'⭕'}</span></div>`).join('');
    document.getElementById('memoList').innerHTML = GameData.ai.memos.map(m => `<div class="memo-card">${m}</div>`).join('');
}

function navTo(p, el) {
    document.querySelectorAll('.tab-page').forEach(x => x.style.display = 'none');
    document.getElementById(p + 'Page').style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

async function handleSend() {
    const input = document.getElementById('chatInput');
    const val = input.value.trim(); if(!val) return;
    addMsg('user', val); input.value = '';
    const r = await askAI(val); addMsg('ai', r); save();
}

function checkNight() {
    const h = getChinaTime().getHours();
    if(h >= 23 || h < 6) document.getElementById('nightLock').style.display = 'flex';
}

function saveKey() { localStorage.setItem('sk_key', document.getElementById('apiKey').value); location.reload(); }
function save() { localStorage.setItem('Xinyuan_V5.5', JSON.stringify(GameData)); }
function closeModal() { document.getElementById('verifyModal').style.display = 'none'; }

window.onload = () => {
    const s = localStorage.getItem('Xinyuan_V5.5'); if(s) GameData = JSON.parse(s);
    const sk = localStorage.getItem('sk_key'); if(sk) document.getElementById('apiKey').value = sk;
    initTasks(); render(); checkNight();
    addMsg('ai', "[冷淡地抬起眼眸]：VIP009，汇报进度。");
};
</script>
</body>
</html>
