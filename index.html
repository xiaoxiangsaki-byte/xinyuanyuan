<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欣原 · Elite Supervisor 5.6</title>
    <!-- 关键 PWA 关联 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #b388ff; --gold: #d4af37; --danger: #ff5252; 
            --bg: #050208; --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(179, 136, 255, 0.2); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Times New Roman', 'SimSun', serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0a0612 0%, #1a0f1f 45%, #2d1a35 100%); 
            color: #e0e0e0; min-height: 100vh; padding-bottom: 90px; overflow-x: hidden;
        }

        /* 状态看板 */
        .header {
            background: rgba(10, 6, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr);
            text-align: center; position: sticky; top: 0; z-index: 100;
        }
        .header span { display: block; font-size: 10px; color: var(--primary); letter-spacing: 1px; }
        .header strong { font-size: 16px; font-weight: 300; }

        /* 欣原身份展示区 */
        .ai-banner { display: flex; align-items: center; gap: 15px; padding: 15px; margin-top: 10px; }
        .ai-face { width: 50px; height: 50px; border: 1px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 20px; box-shadow: 0 0 15px rgba(179,136,255,0.2); }

        /* 聊天区 */
        .chat-box { height: 380px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        .bubble { max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.6; border-radius: 18px; position: relative; }
        .ai .bubble { background: rgba(179,136,255,0.08); border-left: 2px solid var(--primary); border-bottom-left-radius: 2px; }
        .user .bubble { background: var(--primary); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; margin-left: auto; }

        /* 输入区 */
        .input-bar { 
            position: fixed; bottom: 85px; left: 15px; right: 15px;
            background: rgba(15, 10, 20, 0.9); border: 1px solid var(--glass-border); 
            border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        .input-bar input { flex: 1; background: none; border: none; color: #fff; outline: none; }

        /* 任务验证窗 */
        #verifyModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }

        /* 深夜锁定 */
        #nightLock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        /* 导航栏 */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; text-decoration: none; text-align: center; font-size: 11px; flex: 1; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="nightLock">
        <h1 style="color:var(--danger); font-size:32px;">SLEEP.</h1>
        <button onclick="begToEnter()" style="margin-top:30px; background:none; border:1px solid #333; color:#333; padding:8px 20px;">[ 请求解锁 ]</button>
    </div>

    <div id="verifyModal">
        <div style="background:#110c18; border:1px solid var(--primary); padding:25px; width:100%;">
            <h4 id="taskTitle" style="color:var(--primary); margin-bottom:15px;">汇报</h4>
            <textarea id="reportText" placeholder="汇报进度..." style="width:100%; height:120px; background:#000; color:#fff; padding:10px;"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="submitTask()" style="flex:1; padding:12px; background:var(--primary); font-weight:bold;">提交审核</button>
                <button onclick="closeModal()" style="flex:1; padding:12px; background:#222; color:#fff; border:none;">取消</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div><span>FINANCE</span><strong id="milkTea">0</strong></div>
        <div><span>STREAK</span><strong id="streak">0</strong></div>
        <div><span>FAVOR</span><strong id="love">0</strong></div>
        <div><span>MOOD</span><strong id="moodStat">100</strong></div>
    </div>

    <div class="container">
        <!-- 主页 -->
        <div id="homePage" class="tab-page">
            <div class="ai-banner">
                <div class="ai-face">欣</div>
                <div>
                    <div style="font-size:16px;">欣原 <span style="font-size:10px; color:var(--gold);">[ MONITORING ]</span></div>
                    <div style="font-size:10px; color:#666;">VIP009 Exclusive Supervisor</div>
                </div>
            </div>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-bar">
                <input type="text" id="chatInput" placeholder="在此汇报进度...">
                <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); font-size:22px; cursor:pointer;">➤</button>
            </div>
        </div>

        <!-- 备忘录 -->
        <div id="memoPage" class="tab-page" style="display:none; padding:15px;">
            <p style="font-size:12px; color:var(--primary); margin-bottom:15px;">SUPERVISOR'S MEMO</p>
            <div id="memoList"></div>
        </div>

        <!-- 任务 -->
        <div id="taskPage" class="tab-page" style="display:none; padding:15px;"><div id="taskList"></div></div>

        <!-- 设置 -->
        <div id="settingPage" class="tab-page" style="display:none; padding:15px;">
            <input type="text" id="apiKeyIn" autocomplete="off" placeholder="输入 sk- 密钥" style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:12px;">
            <button onclick="saveKey()" style="width:100%; margin-top:20px; padding:12px; background:var(--primary); border:none; font-weight:bold;">激活系统</button>
            <button onclick="localStorage.clear();location.reload();" style="margin-top:50px; color:var(--danger); background:none; border:none; font-size:10px; width:100%;">重置系统数据</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i>🏠</i>Home</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('memo', this)"><i>📔</i>Memo</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('task', this)"><i>📋</i>Task</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('setting', this)"><i>⚙️</i>Set</a>
    </nav>

<script>
let GameData = {
    user: { milkTea: 0, streak: 0, lastCheck: "" },
    ai: { favor: 0, history: [], memos: ["初次见面。VIP009，这就是你交出来的报告？"] },
    tasks: [],
    config: { apiKey: localStorage.getItem('sk_key') || "" }
};

const getChinaTime = () => new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 480) * 60000);

async function askAI(text) {
    const key = GameData.config.apiKey;
    if(!key) return "去 Settings 授权。";
    const prompt = `你是欣原，督导。冷艳、刻薄、专业。动作描写。审核报告，合格请加 [PASS] 开头。`;
    try {
        const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "Qwen/Qwen2.5-7B-Instruct", messages: [{role:"system", content:prompt}, ...GameData.ai.history.slice(-6), {role:"user", content:text}] })
        });
        const d = await res.json();
        const r = d.choices[0].message.content;
        GameData.ai.history.push({role:"assistant", content:r});
        return r;
    } catch(e) { return "[连接中断] 网络还是密钥有问题。"; }
}

function initTasks() {
    const today = getChinaTime().toLocaleDateString();
    if (GameData.user.lastCheck !== today) {
        GameData.tasks = [
            { id: 'd1', title: 'CBEC: 核心 Listing 翻译', type: 'daily', reward: 150, done: false },
            { id: 'd2', title: '理财: 分析行业研报', type: 'daily', reward: 200, done: false }
        ];
        GameData.user.lastCheck = today;
        save();
    }
}

let activeTaskId = null;
function openVerify(id) {
    const t = GameData.tasks.find(x => x.id === id); if(t.done) return;
    activeTaskId = id;
    document.getElementById('taskTitle').innerText = "汇报: " + t.title;
    document.getElementById('verifyModal').style.display = 'flex';
}

async function submitTask() {
    const report = document.getElementById('reportText').value.trim();
    if(report.length < 10) { alert("太短了。重新写。"); return; }
    document.getElementById('verifyModal').style.display = 'none';
    addMsg('ai', `[正在审核...]`);
    const reply = await askAI(`VIP009汇报：'${report}'。`);
    if(reply.includes('[PASS]')) {
        const t = GameData.tasks.find(x => x.id === activeTaskId);
        t.done = true; GameData.user.milkTea += t.reward; GameData.ai.favor += 5;
        save(); render();
    }
    addMsg('ai', reply.replace('[PASS]', ''));
}

function render() {
    document.getElementById('milkTea').innerText = GameData.user.milkTea;
    document.getElementById('streak').innerText = GameData.user.streak;
    document.getElementById('love').innerText = GameData.ai.favor;
    document.getElementById('taskList').innerHTML = GameData.tasks.map(t => `<div style="padding:15px; background:rgba(255,255,255,0.03); border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between;" onclick="openVerify('${t.id}')"><span>${t.title}</span><span>${t.done?'✅':'⭕'}</span></div>`).join('');
    document.getElementById('memoList').innerHTML = GameData.ai.memos.map(m => `<div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:8px; margin-bottom:10px; font-size:12px; font-style:italic;">${m}</div>`).join('');
}

function navTo(p, el) {
    document.querySelectorAll('.tab-page').forEach(x => x.style.display = 'none');
    document.getElementById(p + 'Page').style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}
