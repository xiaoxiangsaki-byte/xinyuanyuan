<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP009 · 欣原监督系统 6.3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #c5a3ff; /* 荧光柔紫 */
            --secondary: #9c64ff; /* 皇家幽紫 */
            --accent: #ffd54f; /* 尊贵暗金 */
            --bg-dark: #080410; /* 极夜深渊 */
            --bg-card: rgba(22, 12, 35, 0.85); /* 磨砂半透紫 */
            --text-primary: #ffffff;
            --text-secondary: #b39ddb; /* 优雅薰衣草 */
            --success: #69f0ae; /* 盎然翡绿 */
            --danger: #ff5252;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #07030d 0%, #150a24 40%, #26113b 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(197, 163, 255, 0.08), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(156, 100, 255, 0.08), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .pixel-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
            font-size: 45px;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        .pixel-heart-1 { top: 10%; left: 5%; }
        .pixel-heart-2 { top: 60%; right: 8%; }
        .pixel-paw { bottom: 15%; left: 10%; }
        .pixel-bow { top: 35%; right: 5%; }
        
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 15px; 
            position: relative; 
            z-index: 1; 
        }
        
        .header {
            background: linear-gradient(135deg, rgba(197, 163, 255, 0.1), rgba(156, 100, 255, 0.05));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(197, 163, 255, 0.2);
            box-shadow: 0 10px 30px rgba(156, 100, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .user-info { 
            display: flex; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: center; 
        }
        
        .user-stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 11px; color: var(--text-secondary); }
        .stat-value { 
            font-size: 18px; 
            font-weight: bold; 
            color: var(--primary); 
            text-shadow: 0 0 10px rgba(197, 163, 255, 0.4); 
        }
        
        .currency {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(197, 163, 255, 0.2), rgba(156, 100, 255, 0.1));
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid rgba(197, 163, 255, 0.3);
            box-shadow: 0 5px 15px rgba(197, 163, 255, 0.15);
        }
        
        .ai-chat-section {
            background: linear-gradient(135deg, rgba(15, 10, 25, 0.95), rgba(30, 15, 45, 0.9));
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(197, 163, 255, 0.2);
            box-shadow: 0 15px 40px rgba(156, 100, 255, 0.15);
            overflow: hidden;
            backdrop-filter: blur(15px);
        }
        
        .chat-header {
            background: linear-gradient(90deg, rgba(156, 100, 255, 0.2), rgba(197, 163, 255, 0.1));
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(197, 163, 255, 0.1);
        }
        
        .ai-avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(197, 163, 255, 0.4);
            object-fit: cover;
        }
        
        .ai-info { flex: 1; margin-left: 12px; }
        .ai-name { 
            font-size: 20px; 
            font-weight: bold; 
            background: linear-gradient(90deg, var(--primary), var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .ai-status { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .affection-indicator { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 4px; 
        }
        .affection-mini-bar { 
            width: 90px; 
            height: 6px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 3px; 
            overflow: hidden; 
        }
        .affection-mini-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--accent)); 
            transition: width 0.5s; 
        }
        
        .chat-messages { 
            height: 350px; 
            overflow-y: auto; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
        }
        
        .message-bubble { 
            display: flex; 
            margin-bottom: 15px; 
            animation: messageSlideIn 0.3s ease; 
        }
        
        @keyframes messageSlideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .message-bubble.ai { justify-content: flex-start; }
        .message-bubble.user { justify-content: flex-end; }
        
        .message-content { max-width: 80%; margin: 0 10px; }
        
        .message-text {
            padding: 12px 18px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        
        .message-bubble.ai .message-text {
            background: linear-gradient(135deg, rgba(197, 163, 255, 0.15), rgba(156, 100, 255, 0.1));
            border: 1px solid rgba(197, 163, 255, 0.2);
            border-top-left-radius: 2px;
            color: #e2d9f3;
        }
        
        .message-bubble.user .message-text {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-right-radius: 2px;
            color: #ffffff;
        }
        
        .message-time { 
            font-size: 10px; 
            color: var(--text-secondary); 
            margin-top: 4px; 
            opacity: 0.6; 
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(197, 163, 255, 0.15);
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(10, 5, 20, 0.6);
            border: 1px solid rgba(197, 163, 255, 0.25);
            border-radius: 20px;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }
        
        .chat-input::placeholder { color: var(--text-secondary); opacity: 0.5; }
        
        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover, .send-btn:active { 
            transform: scale(1.05); 
            box-shadow: 0 0 15px rgba(197, 163, 255, 0.5); 
        }

        #imgPreview {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: none;
            object-fit: cover;
            border: 1.5px solid var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }
        
        .btn {
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(197, 163, 255, 0.2);
        }
        
        .btn:hover, .btn:active { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(197, 163, 255, 0.4); 
        }
        
        .btn-secondary { 
            background: rgba(15, 10, 25, 0.7); 
            border: 1px solid rgba(197, 163, 255, 0.3); 
            color: var(--text-primary);
        }
        .btn-small { padding: 6px 14px; font-size: 12px; }
        
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
        }
        
        .tab {
            padding: 12px 24px;
            background: rgba(15, 10, 25, 0.6);
            border: 1px solid rgba(197, 163, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            user-select: none;
            color: var(--text-secondary);
        }
        
        .tab:active { transform: scale(0.97); }
        
        .tab.active { 
            background: linear-gradient(135deg, rgba(197, 163, 255, 0.2), rgba(156, 100, 255, 0.15));
            border-color: var(--primary);
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(156, 100, 255, 0.2);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .tasks-section { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
            margin-bottom: 15px; 
        }
        
        .task-category { 
            background: linear-gradient(135deg, rgba(20, 10, 30, 0.85), rgba(35, 15, 50, 0.8));
            border-radius: 18px;
            padding: 18px;
            border: 1px solid rgba(197, 163, 255, 0.2);
            box-shadow: 0 5px 20px rgba(156, 100, 255, 0.1);
        }
        
        .category-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin-bottom: 12px; 
            color: var(--primary); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        
        .task-item {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
            transition: all 0.3s;
        }
        
        .task-item:hover, .task-item:active { 
            transform: translateX(4px); 
            box-shadow: 0 4px 12px rgba(197, 163, 255, 0.15); 
        }
        
        .task-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .task-title { font-weight: bold; font-size: 14px; }
        .task-reward { color: var(--primary); font-weight: bold; font-size: 13px; }
        .task-progress { 
            height: 6px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 3px; 
            overflow: hidden; 
            margin: 8px 0; 
        }
        .task-progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--accent)); 
            transition: width 0.5s; 
        }
        .task-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .task-item.completed { opacity: 0.5; }
        .task-item.expired { opacity: 0.4; }
        
        .shop-section { 
            background: linear-gradient(135deg, rgba(20, 10, 30, 0.85), rgba(35, 15, 50, 0.8));
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(197, 163, 255, 0.2);
        }
        
        .shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
        }
        
        .shop-item {
            background: rgba(0,0,0,0.3);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .shop-item:hover, .shop-item:active { 
            transform: translateY(-5px); 
            border-color: var(--primary); 
            box-shadow: 0 8px 20px rgba(156, 100, 255, 0.25); 
        }
        
        .shop-item-icon { font-size: 40px; margin-bottom: 8px; }
        .shop-item-name { font-weight: bold; margin-bottom: 6px; font-size: 13px; }
        .shop-item-price { color: var(--primary); font-weight: bold; font-size: 14px; }
        
        .settings-section { 
            background: linear-gradient(135deg, rgba(20, 10, 30, 0.85), rgba(35, 15, 50, 0.8));
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(197, 163, 255, 0.2);
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .setting-input {
            padding: 8px 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(197, 163, 255, 0.3);
            border-radius: 6px;
            color: var(--text-primary);
            min-width: 200px;
            flex: 1;
            outline: none;
        }
        
        .notification {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 15px 25px;
            background: linear-gradient(135deg, rgba(156, 100, 255, 0.95), rgba(197, 163, 255, 0.9));
            border-radius: 12px;
            z-index: 10000;
            animation: slideInRight 0.3s;
            box-shadow: 0 8px 30px rgba(156, 100, 255, 0.4);
            max-width: 300px;
            color: #000;
            font-weight: bold;
        }
        
        @keyframes slideInRight { 
            from { transform: translateX(350px); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(15, 10, 25, 0.98), rgba(30, 15, 45, 0.95));
            border-radius: 16px;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            border: 1.5px solid var(--primary);
            box-shadow: 0 15px 40px rgba(156, 100, 255, 0.5);
        }
        
        .modal-header { 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: var(--primary); 
        }
        .modal-body { margin-bottom: 20px; line-height: 1.6; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(197, 163, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(197, 163, 255, 0.2);
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce { 
            0%, 60%, 100% { transform: translateY(0); } 
            30% { transform: translateY(-8px); } 
        }
        
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 15px; }
            .chat-messages { height: 280px; }
            .user-info { flex-direction: column; align-items: stretch; }
            .tasks-section { grid-template-columns: 1fr; }
            .setting-item { flex-direction: column; align-items: stretch; }
            .setting-input { min-width: 100%; }
            .pixel-decoration { display: none; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-radius: 4px; 
        }
    </style>
    
    <!-- PWA 支持 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b388ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VIP009">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker 已注册'))
                    .catch(err => console.log('Service Worker 注册失败:', err));
            });
        }
    </script>
</head>
<body>
    <!-- 暗紫冷艳风格像素装饰 -->
    <div class="pixel-decoration pixel-heart-1">🔮</div>
    <div class="pixel-decoration pixel-heart-2">🥀</div>
    <div class="pixel-decoration pixel-paw">🐾</div>
    <div class="pixel-decoration pixel-bow">🎀</div>

    <div class="container">
        <!-- 顶部状态栏 -->
        <div class="header">
            <div class="user-info">
                <div>
                    <h1 style="font-size: 24px; margin-bottom: 5px; color: var(--primary);">VIP009 · 欣原监督系统</h1>
                    <p style="color: var(--text-secondary); font-size: 13px;">
                        <span id="currentTime"></span> | 连续打卡: <span id="streakDays" style="color: var(--primary); font-weight: bold;">0</span>天
                    </p>
                </div>
                <div class="user-stats">
                    <div class="stat-item"><div class="stat-label">健康</div><div class="stat-value" id="healthStat">100</div></div>
                    <div class="stat-item"><div class="stat-label">活力</div><div class="stat-value" id="energyStat">100</div></div>
                    <div class="stat-item"><div class="stat-label">心情</div><div class="stat-value" id="moodStat">100</div></div>
                    <div class="stat-item"><div class="stat-label">专注</div><div class="stat-value" id="focusStat">100</div></div>
                </div>
                <!-- 货币改为：小奶糕 🍰 -->
                <div class="currency"><span style="font-size: 20px;">🍰</span><span id="milkTeaAmount">0</span></div>
            </div>
        </div>
        
        <!-- AI聊天区域 -->
        <div class="ai-chat-section">
            <div class="chat-header">
                <div style="display: flex; align-items: center; flex: 1;">
                    <!-- 软化高阶美感的KaiTi行楷SVG头像 -->
                    <svg class="ai-avatar-img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                        <defs>
                            <radialGradient id="grad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" style="stop-color:#d1c4e9;stop-opacity:1" />
                                <stop offset="70%" style="stop-color:#9c64ff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#150a24;stop-opacity:1" />
                            </radialGradient>
                            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <circle cx="50" cy="50" r="46" fill="url(#grad)" stroke="#ffd54f" stroke-width="2" filter="url(#softGlow)" />
                        <text x="50" y="63" font-family="'STKaiti', 'KaiTi', 'SimSun', serif" font-size="34" font-weight="900" text-anchor="middle" fill="#ffffff" style="text-shadow: 0 0 8px rgba(255, 255, 255, 0.85);">欣</text>
                    </svg>
                    <div class="ai-info">
                        <div class="ai-name">欣原</div>
                        <div class="ai-status">在线 · <span id="aiMoodText">😐 冷淡</span></div>
                    </div>
                </div>
                <div class="affection-indicator">
                    <div style="font-size: 12px; color: var(--text-secondary);">
                        <span id="relationshipStatus">陌生人</span> · <span id="affectionValue">0</span>/100
                    </div>
                    <div class="affection-mini-bar">
                        <div class="affection-mini-fill" id="affectionMiniFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <!-- 移除了原有的 quick-replies 快捷消息区域 -->
            
            <div class="chat-input-area">
                <!-- 预留证据图片上传按钮 -->
                <label style="cursor: pointer; font-size: 22px; margin-right: 5px; user-select: none;" title="呈递实操照片">📷<input type="file" id="evidenceImage" accept="image/*" style="display: none;" onchange="compressAndPreview(this)"></label>
                <img id="imgPreview" src="" alt="预览">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息...按Enter或键盘发送键发送">
                <button class="send-btn" onclick="sendMessage()">▶</button>
            </div>
        </div>
        
        <!-- Tab导航 (显式传递 this 解决点击穿透失效问题) -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('tasks', this)">📋 任务中心</div>
            <div class="tab" onclick="switchTab('shop', this)">🛍️ 礼物商店</div>
            <div class="tab" onclick="switchTab('settings', this)">⚙️ 系统设置</div>
        </div>
        
        <!-- 任务Tab -->
        <div id="tasksTab" class="tab-content active">
            <div class="tasks-section">
                <div class="task-category">
                    <div class="category-title"><span>⏰</span><span>每日任务</span></div>
                    <div id="dailyTasksList"></div>
                </div>

    <script>

        const MANDARIN_POOL = [

            { title: "普通话: 字词咬字纠音自查", desc: "自主整理并大声练习20个平翘舌、边音鼻音（l/n）、前后鼻音易错词，记录纠音心得" },
            { title: "普通话: 声音音色气调训练", desc: "执行15分钟的腹式呼吸、开音节咬字胸腔共鸣深度发声训练，提交复盘日志" }
        ];

        let uploadedImageBase64 = null; // 用于存放用户拍照/上传压缩后的 base64 数据

        function shuffleAndPick(pool, count = 1) {
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // ==================== 压缩与转化 Base64 (前端优化) ====================
        function compressAndPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const max_size = 500; // 高压缩极限防传输重置
                        let w = img.width;
                        let h = img.height;
                        if (w > h && w > max_size) {
                            h *= max_size / w;
                            w = max_size;
                        } else if (h > w && h > max_size) {
                            w *= max_size / h;
                            h = max_size;
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        uploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        // 显示微缩预览
                        const preview = document.getElementById('imgPreview');
                        preview.src = uploadedImageBase64;
                        preview.style.display = 'inline-block';
                        showNotification('📷 证据照片已就绪');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ==================== 时间系统 (中国标准时间 3:00 AM 重置) ====================
        const TimeSystem = {
            getChinaTime() {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                const chinaOffset = 8 * 3600000;
                return new Date(now.getTime() + offset + chinaOffset);
            },
            
            formatTime(date) {
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                const month = (date.getMonth() + 1).toString().padStart(2, '0');
                const day = date.getDate().toString().padStart(2, '0');
                return `${month}/${day} ${hours}:${minutes}`;
            },
            
            isNewDay(lastTime) {
                if (!lastTime) return true;
                
                // 3:00 AM CST 刷新每日任务机制：往回平移3个小时判断
                const last = new Date(lastTime - 3 * 3600000);
                const now = new Date(this.getChinaTime().getTime() - 3 * 3600000);
                
                const lastDateStr = `${last.getFullYear()}-${(last.getMonth() + 1).toString().padStart(2, '0')}-${last.getDate().toString().padStart(2, '0')}`;
                const nowDateStr = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}`;
                
                return lastDateStr !== nowDateStr;
            }
        };

        // ==================== 任务系统 (更新为主线：跨境英语、财商、身材管理、普通话) ====================
        const TaskSystem = {
            generateDailyTasks() {
                const cbecTask = shuffleAndPick(CBEC_POOL, 1)[0];
                const finTask = shuffleAndPick(FINANCE_POOL, 1)[0];
                const bodyTask = shuffleAndPick(BODY_POOL, 1)[0];
                const mandarinTask = shuffleAndPick(MANDARIN_POOL, 1)[0];

                const tasks = [
                    { id: 'd1', title: cbecTask.title, desc: cbecTask.desc, progress: 0, maxProgress: 1, reward: 80, completed: false },
                    { id: 'd2', title: finTask.title, desc: finTask.desc, progress: 0, maxProgress: 1, reward: 100, completed: false },
                    { id: 'd3', title: bodyTask.title, desc: bodyTask.desc, progress: 0, maxProgress: 1, reward: 120, completed: false },
                    { id: 'd4', title: mandarinTask.title, desc: mandarinTask.desc, progress: 0, maxProgress: 1, reward: 100, completed: false },
                    { id: 'd5', title: '和欣原深度咨询', desc: '在系统里向欣原汇报，发送10条对话', progress: 0, maxProgress: 10, reward: 50, completed: false }
                ];
                
                return tasks;
            },
            
            initMainQuests() {
                const now = TimeSystem.getChinaTime().getTime();
                return [
                    { 
                        id: 'm1', 
                        title: '主线: 跨境英语巅峰突破', 
                        description: '提交15次跨境 Listing/开发信深度实操报告并通过审核',
                        progress: 0, 
                        maxProgress: 15, 
                        reward: 800, 
                        completed: false,
                        deadline: now + 30 * 24 * 60 * 60 * 1000,

                    },
                    { 
                        id: 'm2', 
                        title: '主线: 财商觉醒与资本限制', 
                        description: '向欣原提交5份目标上市企业独立财报分析报告并通过审核',

                    },
                    { 
                        id: 'm4', 
                        title: '主线: 雅言修身与国语纠音', 
                        description: '完成10篇经典美文/绕口令咬字专项训练，并向欣原提交自查报告通过审核',
                        progress: 0,

                        completed: false,
                        deadline: now + 30 * 24 * 60 * 60 * 1000,
                        expired: false
                    }
                ];
            },
            
            initSideQuests() {
                const now = TimeSystem.getChinaTime().getTime();
                return [
                    { 
                        id: 's1', 
                        title: '支线: 精熟粤语日常', 
                        description: '掌握10个高阶或日常粤语短语',
                        progress: 0, 
                        maxProgress: 10, 
                        reward: 300, 
                        completed: false,
                        deadline: now + 30 * 24 * 60 * 60 * 1000,
                        expired: false,
                        phrases: [
                            '早晨 (zou2 san4) - 早上好',
                            '多谢 (do1 ze6) - 谢谢',
                            '唔该 (m4 goi1) - 不好意思/谢谢',
                            '好耐冇见 (hou2 noi6 mou5 gin3) - 好久不见',

                            '食饭未 (sik6 faan6 mei6) - 吃饭了吗',

            },

            // 呈递审核窗口：防止误触、需要提交理由、欣原实时严格判定
            triggerVerify(taskId) {
                let taskList;
                if (taskId.startsWith('d')) taskList = GameData.tasks.daily;
                else if (taskId.startsWith('m')) taskList = GameData.tasks.mainQuests;
                else if (taskId.startsWith('s')) taskList = GameData.tasks.sideQuests;

                const task = taskList.find(t => t.id === taskId);
                if (!task || task.completed) return;

                const title = document.getElementById('modalTitle');
                const body = document.getElementById('modalBody');
                const footer = document.getElementById('modalFooter');

                title.textContent = `📋 任务呈递: ${task.title}`;
                body.innerHTML = `
                    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 15px; line-height: 1.6;">
                        <strong>描述:</strong> ${task.desc || task.description || '暂无说明'}
                    </p>
                    <p style="font-size: 12px; color: var(--accent); margin-bottom: 10px;">
                        ⚠️ 警告：欣原正密切监视着你的呈递。请输入你真实的成果汇报，若有实操截图证据，请在聊天输入框左侧点击📷拍照后，再来弹窗中点击提交。
                    </p>
                    <textarea id="evidenceReport" placeholder="在此输入你的实操成果报告、分析心得、朗读自查纠错或身材管理打卡凭证（至少10个字符）..." style="width: 100%; height: 120px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(197,163,255,0.3); border-radius: 12px; padding: 12px; font-size: 13px; outline: none; resize: none;"></textarea>
                `;

                footer.innerHTML = `
                    <button class="btn btn-secondary btn-small" onclick="closeModal()">取消</button>
                    <button class="btn btn-small" onclick="TaskSystem.submitReport('${taskId}')">递交欣原审查</button>
                `;

                document.getElementById('modal').classList.add('active');
            },

            async submitReport(taskId) {
                const report = document.getElementById('evidenceReport').value.trim();
                if (report.length < 10) {
                    alert("你的汇报太敷衍了。至少写满 10 个字，否则欣原会当场疏远你。");
                    return;
                }

                closeModal();
                
                const activeImg = uploadedImageBase64;
                uploadedImageBase64 = null;
                document.getElementById('imgPreview').style.display = 'none';

                addAIMessage(`[正在查验并审阅你关于任务的汇报：'${report.substring(0, 15)}...' ${activeImg ? ' (附带实操截图证明)' : ''}]`);
                
                showTypingIndicator();
                
                // 深度审核Prompt，教她读取运动设备/Listing文字/财报指标，严格打假
                const verifyPrompt = `[系统指令：用户 VIP009 正在向你呈递一项任务成果报告。
                任务名称：'${taskId.startsWith('d') ? GameData.tasks.daily.find(t => t.id === taskId).title : (taskId.startsWith('m') ? GameData.tasks.mainQuests.find(t => t.id === taskId).title : GameData.tasks.sideQuests.find(t => t.id === taskId).title)}'
                用户的实操汇报：'${report}'
                
                你此时已接收到了她发送的图片数据。
                请你以欣原的冷艳、极度严格的姿态对该图片和汇报文字进行真实、极度精密的审查：
                1. 智能OCR读取并识别她图片中的内容：
                   - 如果是身材管理：仔细读取运动手表、手环、App截图上的数据，如运动时间、公里数、消耗卡路里。审核其是否达到了任务宣称的训练负荷。
                   - 如果是跨境英语：阅读她上传的Listing文字或草稿，审查翻译和卖点拆解的深度。
                   - 如果是财报理财：审查她图片中的资产负债数字和资产流向细节。
                2. 如果她企图用不相关的宠物图、风景照或完全敷衍的文字来糊弄你，冷酷地看穿并痛骂她，直接拒收！
                3. 如果确实合格、真诚，请在你的回复【最开头】加上 [PASS] 标记，并进行勉强的、施舍般的点评。
                4. 如果不合格或作假，绝对不要加上 [PASS] 标记，并且极度犀利地打回，羞辱她的懒散。]`;

                try {
                    const reply = await AISystem.callAPI(verifyPrompt, activeImg);
                    hideTypingIndicator();
                    
                    if (reply.includes('[PASS]')) {
                        const cleanReply = reply.replace('[PASS]', '').trim();
                        addAIMessage(cleanReply);
                        
                        let taskList;
                        if (taskId.startsWith('d')) taskList = GameData.tasks.daily;
                        else if (taskId.startsWith('m')) taskList = GameData.tasks.mainQuests;
                        else if (taskId.startsWith('s')) taskList = GameData.tasks.sideQuests;

                        const task = taskList.find(t => t.id === taskId);
                        if (task) {
                            task.progress = Math.min(task.progress + 1, task.maxProgress);
                            if (task.progress >= task.maxProgress && !task.completed) {
                                task.completed = true;
                                GameData.user.currency.milkTea += task.reward;
                                showNotification(`✅ 欣原审核通过！获得 ${task.reward} 🍰`);
                                RelationshipSystem.changeAffection(5);
                            }
                        }
                    } else {
                        addAIMessage(reply);
                        showNotification(`❌ 审核未通过！好感度下降并被拒。`);
                        RelationshipSystem.changeAffection(-3);
                    }
                } catch (e) {
                    hideTypingIndicator();
                    addAIMessage("（网络波动，查验链路受损。VIP009，再去点一次递交。）");
                }
                
                saveData();
                updateUI();
            },
            
            updateTaskProgress(taskId, newProgress) {
                this.triggerVerify(taskId);
            },
            
            checkExpiredTasks() {
                const now = TimeSystem.getChinaTime().getTime();
                let hasExpired = false;
                
                [...GameData.tasks.mainQuests, ...GameData.tasks.sideQuests].forEach(task => {
                    if (!task.completed && !task.expired && now > task.deadline) {
                        task.expired = true;
                        hasExpired = true;
                        RelationshipSystem.changeAffection(-10);
                    }
                });
                
                if (hasExpired) {
                    saveData();
                    updateUI();
                }
            }
        };

        // ==================== 关系系统 ====================
        const RelationshipSystem = {
            changeAffection(amount) {
                GameData.ai.affection = Math.max(-100, Math.min(100, GameData.ai.affection + amount));
                this.updateMood();
                updateUI();
                saveData();
            },
            
            updateMood() {
                const affection = GameData.ai.affection;
                
                if (affection < 0) {
                    GameData.ai.mood = 'cold_war';
                    document.getElementById('aiMoodText').textContent = '🩸 冷战 (Dom)';
                    document.getElementById('relationshipStatus').textContent = '奴仆';
                } else if (affection < 20) {
                    GameData.ai.mood = 'cold';
                    document.getElementById('aiMoodText').textContent = '😐 冷淡';
                    document.getElementById('relationshipStatus').textContent = '陌生人';
                } else if (affection < 40) {
                    GameData.ai.mood = 'neutral';
                    document.getElementById('aiMoodText').textContent = '🙂 普通';
                    document.getElementById('relationshipStatus').textContent = '熟人';
                } else if (affection < 60) {
                    GameData.ai.mood = 'friendly';
                    document.getElementById('aiMoodText').textContent = '😊 友好';
                    document.getElementById('relationshipStatus').textContent = '朋友';
                } else if (affection < 80) {
                    GameData.ai.mood = 'warm';
                    document.getElementById('aiMoodText').textContent = '😄 亲密';
                    document.getElementById('relationshipStatus').textContent = '好友';
                } else {
                    GameData.ai.mood = 'loving';
                    document.getElementById('aiMoodText').textContent = '🥰 热恋';
                    document.getElementById('relationshipStatus').textContent = '挚友';
                }
            }
        };

        // ==================== 商店系统 ====================
        const ShopSystem = {
            items: [

                        saveData();
                        updateUI();
                        showNotification('✅ 数据导入成功！');
                        location.reload();
                    } catch (error) {
                        showNotification('❌ 数据格式错误！');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetData() {
            if (!confirm('确定要重置所有数据吗？此操作不可恢复！')) return;
            
            localStorage.removeItem('xinyuanGameData');
            location.reload();
        }

        // ==================== 数据持久化 ====================
        function saveData() {
            localStorage.setItem('xinyuanGameData', JSON.stringify(GameData));
        }

        function loadData() {
            const saved = localStorage.getItem('xinyuanGameData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.assign(GameData, data);
                } catch (error) {
                    console.error('数据加载失败:', error);
                }
            }
            
            if (TimeSystem.isNewDay(GameData.user.records.lastCheckIn)) {
                GameData.tasks.daily = TaskSystem.generateDailyTasks();
                
                if (GameData.user.records.lastCheckIn) {
                    const lastDate = new Date(GameData.user.records.lastCheckIn);
                    const now = TimeSystem.getChinaTime();
                    const daysDiff = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
                    
                    if (daysDiff === 1) {
                        GameData.user.records.streak++;
                        showNotification('🎉 新的一天！连续打卡+1');
                        addAIMessage(`[端起红酒杯，冷静地扫过你的档案]：早上好，VIP009。今天是你连续打卡的第 ${GameData.user.records.streak} 天。勉强合格，今天也要在我的注视下彻底执行任务，明白么？`);
                    } else if (daysDiff > 1) {
                        GameData.user.records.streak = 1;
                        showNotification('💔 检测到断签，连续打卡已重置');
                        addAIMessage('[推了推眼镜，眼神没有一丝温度]：断签了，VIP009。连这点自律的意志都保障不了，你凭什么实现你的跨境目标？给我重新跪在起点反省。');
                        RelationshipSystem.changeAffection(-10); // 断签重罚
                    } else {
                        GameData.user.records.streak = Math.max(1, GameData.user.records.streak);
                    }
                } else {
                    GameData.user.records.streak = 1;
                    showNotification('🎉 欢迎来到欣原监督系统！');
                    addAIMessage('[优雅地交叠双腿，手指敲击着办公桌面]：你好，VIP009。我是你的监护人欣原。从今天开始，我会对你的跨境电商英语、财务投资、身材管理进行全方位严苛监控。别想在我的眼皮底下有任何松懈。');
                }
                
                GameData.user.records.lastCheckIn = Date.now();
                saveData();
            }
            
            if (!GameData.tasks.daily || GameData.tasks.daily.length === 0) {
                GameData.tasks.daily = TaskSystem.generateDailyTasks();
            }
            if (!GameData.tasks.mainQuests || GameData.tasks.mainQuests.length === 0) {
                GameData.tasks.mainQuests = TaskSystem.initMainQuests();
            }
            if (!GameData.tasks.sideQuests || GameData.tasks.sideQuests.length === 0) {
                GameData.tasks.sideQuests = TaskSystem.initSideQuests();
            }
            
            if (GameData.settings.apiKey) {
                document.getElementById('apiKeyInput').value = GameData.settings.apiKey;
            }
            document.getElementById('autoPushText').textContent = GameData.settings.autoPushEnabled ? '已开启' : '已关闭';
            
            saveData();
        }

        // ==================== 初始化 ====================
        function init() {
            loadData();
            updateUI();
            RelationshipSystem.updateMood();
            
            setInterval(() => {
                document.getElementById('currentTime').textContent = TimeSystem.formatTime(TimeSystem.getChinaTime());
            }, 30000);
            
            setInterval(() => {
                TaskSystem.checkExpiredTasks();
            }, 60000);
            
            AutoPushSystem.start();
            
            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
            
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            document.getElementById('apiKeyInput').addEventListener('change', (e) => {
                GameData.settings.apiKey = e.target.value.trim();
                saveData();
                showNotification('✅ API Key已保存');
            });
            
            GameData.ai.dialogHistory.slice(-5).forEach(msg => {
                if (msg.role === 'user') {
                    addUserMessage(msg.content);
                } else {
                    addAIMessage(msg.content, true);
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
