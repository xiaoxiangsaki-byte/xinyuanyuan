        #diaryView .diary-area .diary-history .entry .del-btn { font-size: 12px; color: rgba(255,82,82,0.3); background: none; border: none; cursor: pointer; padding: 2px 6px; transition: 0.3s; }
        #diaryView .diary-area .diary-history .entry .del-btn:active { color: rgba(255,82,82,0.7); }
        #chibi { position: fixed; bottom: 80px; right: 12px; width: 56px; height: 56px; cursor: grab; z-index: 99999; user-select: none; border-radius: 50%; background: rgba(18,10,30,0.2); backdrop-filter: blur(4px); border: 1px solid rgba(197,163,255,0.05); box-shadow: 0 4px 24px rgba(0,0,0,0.2); transition: transform 0.2s; overflow: hidden; touch-action: none; }
        #chibi img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 50%; pointer-events: none; }
        .chibi-bubble { position: fixed; z-index: 99999; background: rgba(18,10,30,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(197,163,255,0.05); border-radius: 10px; padding: 4px 10px; font-size: 12px; color: #fff; opacity: 0; transform: translateY(6px) scale(0.96); transition: opacity 0.25s ease, transform 0.25s ease; pointer-events: none; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.25); max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .chibi-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
        .chibi-bubble::after { content: ''; position: absolute; bottom: -7px; right: 16px; width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 7px solid rgba(18,10,30,0.85); }
        .notification { position: fixed; top: 14px; right: 14px; padding: 6px 14px; background: rgba(18,10,30,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(197,163,255,0.06); border-radius: 10px; color: #fff; font-size: 11px; z-index: 99999; animation: slideIn 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 240px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 99998; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal .content { background: rgba(18,10,30,0.95); border: 1px solid rgba(197,163,255,0.06); border-radius: 14px; padding: 16px; max-width: 340px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal .content h3 { color: var(--primary); margin-bottom: 4px; font-size: 14px; }
        .modal .content .desc { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 6px; white-space: pre-wrap; }
        .modal .content .random-reward-preview { font-size: 10px; color: var(--gold); background: rgba(255,213,79,0.06); padding: 4px 8px; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,213,79,0.06); }
        .modal .content .evidence-hint { font-size: 10px; color: #ff6b6b; background: rgba(255,82,82,0.08); padding: 4px 8px; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,82,82,0.08); display: none; }
        .modal .content .evidence-hint.show { display: block; }
        .modal .content .upload-area { background: rgba(0,0,0,0.15); border: 1px dashed rgba(197,163,255,0.15); border-radius: 8px; padding: 8px; margin-bottom: 8px; }
        .modal .content .upload-area .upload-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: rgba(255,255,255,0.3); transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .modal .content .upload-area .upload-label:active { color: var(--primary); }
        .modal .content .upload-area .upload-label input { display: none; }
        .modal .content .upload-area .preview-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .modal .content .upload-area .preview-list .preview-item { position: relative; width: 56px; height: 56px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        .modal .content .upload-area .preview-list .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal .content .upload-area .preview-list .preview-item .remove-btn { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; border-radius: 50%; background: rgba(255,59,48,0.85); border: none; color: #fff; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .modal .content .upload-area .count-hint { font-size: 9px; color: rgba(255,255,255,0.15); margin-top: 4px; }
        .modal .content textarea { width: 100%; height: 70px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 8px; padding: 6px; color: #fff; font-size: 11px; resize: vertical; outline: none; }
        .modal .content textarea:focus { border-color: rgba(197,163,255,0.1); }
        .modal .content .actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
        .modal .content .actions .btn { padding: 3px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; }
        .modal .content .actions .btn.primary { background: linear-gradient(135deg, #c5a3ff, #9c64ff); color: #000; }
        .modal .content .actions .btn.secondary { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.3); }
        .modal .content .actions .btn.danger { background: rgba(255,82,82,0.1); color: #ff6b6b; }
        .random-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(18,10,30,0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,213,79,0.15); border-radius: 18px; padding: 20px 24px; z-index: 99997; max-width: 320px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.8); animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: center; }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .random-notification .icon { font-size: 40px; margin-bottom: 4px; }
        .random-notification .title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
        .random-notification .desc { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; line-height: 1.5; }
        .random-notification .reward-hint { font-size: 10px; color: var(--gold); opacity: 0.6; margin-bottom: 10px; }
        .random-notification .btn { padding: 6px 20px; border-radius: 10px; border: none; background: linear-gradient(135deg, #ffd54f, #ffaa00); color: #000; font-weight: 600; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .random-notification .btn:active { transform: scale(0.95); }
        .random-notification .btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); margin-left: 6px; }
        @media (max-width: 480px) {
            #mainView { padding: 8px 10px 6px; }
            #mainView .top-bar { min-height: 46px; padding: 4px 0 6px; }
            #mainView .top-bar .avatar-sm { width: 36px; height: 36px; }
            #mainView .top-bar .info .name-row h3 { font-size: 14px; }
            #mainView .top-bar .right-stats { font-size: 10px; gap: 8px; }
            #mainView .top-bar .info .signature { font-size: 9px; }
            .affection-mini { padding: 2px 0 4px; }
            #chatView .chat-top { padding: 6px 0 6px; }
            #chatView .chat-top .back-avatar { width: 34px; height: 34px; }
            #chatView .chat-messages-area { padding: 8px 2px 6px; }
            .chat-input-area { padding: 6px 0; }
            #chibi { width: 48px; height: 48px; bottom: 70px; right: 8px; }
            .chibi-bubble { font-size: 11px; padding: 3px 8px; }
            #shopView .shop-grid { grid-template-columns: repeat(2, 1fr); }
            .treasure-grid { grid-template-columns: repeat(2, 1fr); }
            .modal .content .upload-area .preview-list .preview-item { width: 48px; height: 48px; }
            #diaryView .diary-area .diary-history { min-height: 60px; max-height: 150px; }
        }
        @media (max-width: 380px) {
            #mainView { padding: 4px 6px 4px; }
            #mainView .top-bar { min-height: 40px; }
            #mainView .top-bar .avatar-sm { width: 30px; height: 30px; }
            #mainView .top-bar .info .name-row h3 { font-size: 12px; }
            #mainView .top-bar .right-stats { font-size: 9px; gap: 4px; }
            #mainView .top-bar .info .signature { font-size: 8px; }
            .task-item .t-title { font-size: 10px; }
            #chatView .chat-messages-area { padding: 6px 2px 4px; }
            .chat-msg .bubble { font-size: 12px; padding: 6px 10px; }
            #chibi { width: 40px; height: 40px; bottom: 60px; right: 6px; }
            #shopView .shop-grid { grid-template-columns: repeat(2, 1fr); }
            .treasure-grid { grid-template-columns: repeat(2, 1fr); }
            .modal .content .upload-area .preview-list .preview-item { width: 40px; height: 40px; }
            #diaryView .diary-area .diary-history { min-height: 50px; max-height: 120px; }
        }
    </style>

        <div class="content">

            <div class="desc" id="modalDesc">描述</div>

                <label class="upload-label" id="uploadLabel">📤 点击上传图片证据（最多3张）

                </label>
                <div class="preview-list" id="evidencePreviewList"></div>
                <div class="count-hint" id="evidenceCountHint">已选 0 / 3 张</div>

                <button class="btn secondary" onclick="closeModal()">取消</button>
                <button class="btn primary" id="modalConfirmBtn" onclick="submitReport()">递交审核</button>
            </div>
        </div>
    </div>

    <div id="randomNotificationContainer"></div>

    <script>
    // ============================================================
    //  CORE DATA
    // ============================================================
    const MAX_AF = 520;
    const RELS = [
        { max: 0, label: '陌生人' },
        { max: 50, label: '熟人' },
        { max: 150, label: '朋友' },
        { max: 250, label: '好友' },
        { max: 350, label: '挚友' },
        { max: 450, label: '灵魂伴侣' },
        { max: 519, label: '永恒挚爱' },
        { max: 520, label: '永恒契约' }
    ];

    function getRel(af) {
        if (af >= MAX_AF) return RELS[RELS.length - 1];
        for (let r of RELS) { if (af <= r.max) return r; }
        return RELS[0];
    }

    const GameData = {
        user: { currency: { milkTea: 0 }, records: { streak: 0, lastCheckIn: null, lastActiveTime: Date.now() } },
        ai: { affection: 0, dialogHistory: [] },
        tasks: { daily: [], mainQuests: [], sideQuests: [] },
        settings: { apiKey: '', autoPushEnabled: true },
        random: { active: null, cooldown: 0, lastTrigger: 0, mood: 50 },
        mail: { items: [], nextId: 1 },
        chat: { unreadCount: 0 },
        treasure: { milkTea: 0, offsetCards: 0, letters: 0, special: 0 },
        pushPool: [],
        pushIndex: 0,
        cat: { name: 'BB', breed: '阿比西尼亚', fed: false, lastFed: Date.now() },
        diary: { entries: [] },
        checkin: { streak: 0, lastDate: null },
        sleep: { lastCheck: null, data: null, reminderSent: false, punishActive: false, punishLevel: 0 },
        punishTasks: []
    };

    // ============================================================
    //  PUSH MESSAGES
    // ============================================================
    const PUSH_MESSAGES = [
        'VIP009，你今天的任务还亮着红灯。是想让我亲自打电话催你吗？',
        '别以为我不知道你在刷手机。你的任务列表还空着呢。',
        '今天的任务完成度：0%。你是打算创造历史新低吗？',
        '我刚刚看了一眼你的任务列表……算了，不看了，心累。',
        '醒了？还是刚准备睡？你最好告诉我你刚醒。',
        '今天天气不错。……虽然跟你没什么关系，你反正也不出门。',
        '你昨天说的那句话，我还在想。……算了，不告诉你我在想什么。',
        '[把一杯热牛奶推到你面前] 不是特意给你热的……顺便而已。',
        '你手怎么这么凉？……别多想，我只是怕你打字慢影响效率。',
        '又熬夜了？……关我什么事。但如果你明天起不来，任务可不会等你。',
        '衣服穿这么少……行吧，你感冒了我不负责。……啧。',
        '1点了。你还在线。……非要我按着你关机才肯睡？',
        '你最好告诉我你现在已经在床上了。',
        '睡了吗？……没睡的话，现在去睡。',
        '你今天的步数只有2000步？VIP009，你是被钉在椅子上了吗？',
        '你的进度条像被冻住了一样。……要我帮你解冻吗？',
        '你欠我的，是"练习"，不是"眼泪"。',
        '……你今天怎么这么乖？我有点不习惯。',
        '喵……我说的是BB，不是我。',
        '[别过脸去，声音极小] ……喵。你什么都没听见。',
        '我昨天梦见你了。……别问内容。',
        '今晚几点睡？如果还没躺下，现在就去准备。明早我要看到你的睡眠数据。',
        '还没有手环？……你最好在12点前躺下。',
        '睡眠截图呢？……别告诉我你忘了戴。',
        '截图。现在。我不说第二遍。'
    ];

    function initPushPool() { GameData.pushPool = [...PUSH_MESSAGES]; GameData.pushIndex = 0; }

    function getNextPush() {
        if (GameData.pushPool.length === 0) initPushPool();
        const idx = Math.floor(Math.random() * GameData.pushPool.length);
        const msg = GameData.pushPool.splice(idx, 1)[0];
        if (GameData.pushPool.length === 0) initPushPool();
        return msg;
    }

    // ============================================================
    //  TIME
    // ============================================================
    const TS = {
        now() { const d = new Date(); return new Date(d.getTime() + d.getTimezoneOffset() * 60000 + 8 * 3600000); },
        fmt(d) { return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); },
        isNewDay(last) {
            if (!last) return true;
            const a = new Date(last - 3 * 3600000);
            const b = new Date(this.now().getTime() - 3 * 3600000);
            return a.toDateString() !== b.toDateString();
        },
        getHour() { return this.now().getHours(); },
        getMinute() { return this.now().getMinutes(); }
    };

    function showNotif(msg) {
        const el = document.createElement('div');
        el.className = 'notification';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2800);
    }

    // ============================================================
    //  SAVE / LOAD
    // ============================================================
    function saveData() { localStorage.setItem('xinyuanGameData', JSON.stringify(GameData)); }

    function loadData() {
        const saved = localStorage.getItem('xinyuanGameData');
        if (saved) { try { Object.assign(GameData, JSON.parse(saved)); } catch(_) {} }

        if (TS.isNewDay(GameData.user.records.lastCheckIn)) {
            GameData.tasks.daily = TaskSystem.genDaily();
            if (GameData.user.records.lastCheckIn) {
                const diff = Math.floor((TS.now() - new Date(GameData.user.records.lastCheckIn)) / 86400000);
                if (diff === 1) {
                    GameData.user.records.streak++;
                    showNotif('🎉 连续打卡 +1');
                    addChatMessage('assistant', '[端起酒杯] 连续打卡第 '+GameData.user.records.streak+' 天。勉强合格。', true);
                } else if (diff > 1) {
                    GameData.user.records.streak = 1;
                    showNotif('💔 断签重置');
                    addChatMessage('assistant', '[推眼镜] 断签了，重新开始吧。', true);
                }
            } else {
                GameData.user.records.streak = 1;
                showNotif('🎉 欢迎来到欣原监督系统 V2.0');

    let evidenceImages = [];

    function handleEvidenceImages(input) {
        const files = input.files;
        if (!files || files.length === 0) return;
        const remaining = 3 - evidenceImages.length;
        if (remaining <= 0) { showNotif('⚠️ 最多上传3张图片'); input.value = ''; return; }
        const toProcess = Math.min(files.length, remaining);
        for (let i = 0; i < toProcess; i++) {
            const file = files[i];
            if (!file.type.startsWith('image/')) continue;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const maxS = 400;
                    if (w > h && w > maxS) { h *= maxS / w; w = maxS; }
                    else if (h > w && h > maxS) { w *= maxS / h; h = maxS; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                    evidenceImages.push(base64);
                    updateEvidencePreview();
                    if (evidenceImages.length >= 3) {
                        document.getElementById('uploadLabel').style.opacity = '0.3';
                        document.getElementById('uploadLabel').style.pointerEvents = 'none';
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        input.value = '';
    }

        evidenceImages.splice(index, 1);

    async function callAIForVerify(p, images = []) {
        if (!GameData.settings.apiKey) throw new Error('未配置API Key');
        let userContent;
        let modelName = 'Qwen/Qwen2.5-72B-Instruct-128K';
        let temperature = 0.6;

        if (images.length > 0) {
            modelName = 'Qwen/Qwen3-VL-8B-Instruct';

            parts.push({ type: "text", text: p });
            userContent = parts;
        } else {
            userContent = p;
        }

        const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+GameData.settings.apiKey },
            body: JSON.stringify({

                messages: [

        const d = await res.json();
        return d.choices[0].message.content;
    }

    function deduplicateText(text) {
        if (!text) return text;
        const sentences = text.split(/(?<=[。！？\n])/);
        const seen = new Set();
        const unique = [];
        for (let s of sentences) {
            const trimmed = s.trim();
            if (trimmed.length < 5) { unique.push(s); continue; }
            const key = trimmed.substring(0, 25);
            if (!seen.has(key)) { seen.add(key); unique.push(s); }
        }
        let result = unique.join('');
        const repeatPatterns = [
            { pattern: /你连[^，]*？却敢/g, max: 1 },
            { pattern: /你欠我的[^，]*，不是/g, max: 1 },
            { pattern: /你配得上它吗/g, max: 1 },
            { pattern: /你[^，]*？你[^，]*？/g, max: 2 }
        ];
        for (let { pattern, max } of repeatPatterns) {
            const matches = result.match(pattern);
            if (matches && matches.length > max) {
                let count = 0;
                result = result.replace(pattern, (match) => { count++; return count <= max ? match : ''; });
            }
        }
        result = result.replace(/\n{3,}/g, '\n\n');
        result = result.replace(/ {2,}/g, ' ');
        return result.trim();
    }

    function updateChibiBubblePosition() {
        const chibi = document.getElementById('chibi');

        let left = rect.left - bubble.offsetWidth - 12;

        if (left < 8) { left = rect.right + 8; }
        bubble.style.left = Math.max(8, left) + 'px';
        bubble.style.top = Math.max(8, top) + 'px';

    (function initChibiDrag() {
        const el = document.getElementById('chibi');
        if (!el) return;
        let drag = false, ox, oy, touchStartX = 0, touchStartY = 0, hasMoved = false;

        function startDrag(e) {
            const touch = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            ox = touch.clientX - rect.left;
            oy = touch.clientY - rect.top;
            touchStartX = touch.clientX; touchStartY = touch.clientY;
            hasMoved = false;
            drag = true;
            el.style.cursor = 'grabbing';
            e.preventDefault();
        }

        function moveDrag(e) {
            if (!drag) return;
            const touch = e.touches ? e.touches[0] : e;
            if (Math.abs(touch.clientX - touchStartX) > 5 || Math.abs(touch.clientY - touchStartY) > 5) { hasMoved = true; }
            let x = touch.clientX - ox;
            let y = touch.clientY - oy;
            x = Math.max(0, Math.min(window.innerWidth - el.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, y));
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.right = 'auto';
            el.style.bottom = 'auto';
            const bubble = document.getElementById('chibiBubble');
            if (bubble && bubble.classList.contains('show')) { updateChibiBubblePosition(); }
        }

        function endDrag(e) {
            if (drag) {
                drag = false;
                el.style.cursor = 'grab';
                if (!hasMoved) { triggerChibiClick(); }
            }
        }

        function triggerChibiClick() {
            const lines = ['少来。', '别碰了。', '上瘾了是吧？', '手拿开。', '你以为你是谁？', '这么喜欢我？', 'VIP009，你很闲。', '你的任务做完了？', '在这浪费时间？', '我看你是欠训了。', '……还行。', '勉强让你碰一下。', '就一下。', '再点我，好感度会掉哦。', '你点我一下，我扣你10个小奶糕。', '哼。', '……烦。', '离我远点。'];
            showChibiBubble(lines[Math.floor(Math.random()*lines.length)], 1600);
            el.style.borderColor = 'rgba(197,163,255,0.2)';
            el.style.boxShadow = '0 0 20px rgba(197,163,255,0.05)';
            setTimeout(() => { el.style.borderColor = 'rgba(197,163,255,0.05)'; el.style.boxShadow = '0 4px 24px rgba(0,0,0,0.2)'; }, 600);
        }

        el.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('mouseup', endDrag);
        el.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', moveDrag, { passive: false });
        document.addEventListener('touchend', endDrag);
    })();

    async function handleChatContinueFromMsg(msgId) {
        const msgEl = document.getElementById(msgId);

        if (btn) { btn.textContent = '✉ 续写中...'; btn.style.color = 'rgba(197,163,255,0.3)'; }
        const history = GameData.ai.dialogHistory;
        let context = '';
        const recent = history.slice(-5);
        for (let m of recent) {
            let c = m.content;
            if (Array.isArray(c)) { const t = c.find(x => x.type === 'text'); c = t ? t.text : ''; }
            context += (m.role==='user'?'VIP009：':'欣原：')+String(c)+'\n';
        }
        try {
            const prompt = '[系统：以下是VIP009和欣原的最近对话。请以欣原的身份，根据对话上下文，对最后一条回复进行续写/补充。保持欣原的口吻和风格。不要重复已有内容。]\n\n'+context+'\n\n请续写欣原的回复：';
            const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+GameData.settings.apiKey },
                body: JSON.stringify({
                    model: 'Qwen/Qwen2.5-72B-Instruct',
                    messages: [{ role: 'system', content: '你是欣原，高冷、优雅、掌控力强的监护人。禁止重复句式。' }, { role: 'user', content: prompt }],
                    max_tokens: 200,

            addChatMessage('assistant', '✉ [续写] '+reply, false);
            GameData.ai.affection = Math.min(MAX_AF, GameData.ai.affection + 1);
            if (GameData.ai.affection >= MAX_AF && !window._afTriggered) { window._afTriggered = true; triggerMax(); }

        if (btn) { btn.textContent = '✉ 续写'; btn.style.color = ''; }
    }

    function handleChatImage(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        if (!file.type.startsWith('image/')) { showNotif('⚠️ 仅支持图片'); input.value = ''; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const c = document.createElement('canvas');
                let w = img.width, h = img.height;
                const maxS = 400;
                if (w > h && w > maxS) { h *= maxS / w; w = maxS; }
                else if (h > w && h > maxS) { w *= maxS / h; h = maxS; }
                c.width = w; c.height = h;
                const ctx = c.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                chatUploadedImage = c.toDataURL('image/jpeg', 0.6).split(',')[1];
                const preview = document.getElementById('chatImgPreview');
                preview.src = 'data:image/jpeg;base64,'+chatUploadedImage;
                preview.style.display = 'inline-block';
                showNotif('📷 照片已就绪');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

            GameData.chat.unreadCount++;

            GameData.chat.unreadCount++;
            updateUnreadBadge();

        if (hour === 10 && minute >= 0 && minute < 1 && !GameData.sleep.punishActive) {
            const lastCheck = GameData.sleep.lastCheck;

            if (!lastCheck || new Date(lastCheck).toDateString() !== today) {

            GameData.sleep.punishActive = false;
            saveData();
        }
    }

    async function handleSleepImage(imgBase64) {
        const hour = TS.getHour();
        if (hour < 8 || hour > 11) {
            addChatMessage('assistant', '现在不是上传睡眠截图的时间。你是在心虚吗？', true);
            return;
        }

        try {
            const p = '[系统：VIP009 上传了一张睡眠数据截图。请识别图片中的睡眠数据，提取以下信息：1. 入睡时间（几点几分） 2. 总睡眠时长 3. 深睡比例 4. 综合评分。如果图片中没有这些数据，请回复：【无法识别】。如果数据清晰，请按以下格式回复：【入睡】XX:XX 【时长】X小时X分 【深睡】XX% 【评分】优秀/良好/一般/差]';
            const res = await callAIForVerify(p, [imgBase64]);
            if (res.includes('【无法识别】')) {
                addChatMessage('assistant', '这张图我看不清。重新拍一张清晰的，或者你直接告诉我数据。', true);
                return;
            }

            const sleepTimeMatch = res.match(/【入睡】(\d{1,2}:\d{2})/);
            const durationMatch = res.match(/【时长】(\d+)小时(\d+)分/);
            const deepMatch = res.match(/【深睡】(\d+)%/);
            const scoreMatch = res.match(/【评分】(\S+)/);

            const sleepTime = sleepTimeMatch ? sleepTimeMatch[1] : '未知';
            const hours = durationMatch ? parseInt(durationMatch[1]) : 0;
            const mins = durationMatch ? parseInt(durationMatch[2]) : 0;
            const deepPct = deepMatch ? parseInt(deepMatch[1]) : 0;
            const score = scoreMatch ? scoreMatch[1] : '一般';

            GameData.sleep.data = { sleepTime, hours, mins, deepPct, score };
            GameData.sleep.lastCheck = Date.now();
            GameData.sleep.punishActive = false;
            saveData();

            const isLate = sleepTime !== '未知' && (sleepTime > '00:00');
            const isShort = hours < 6 || (hours === 6 && mins < 0);
            const isPoor = score === '差' || deepPct < 15;

            if (isLate || isShort || isPoor) {
                GameData.sleep.punishLevel = Math.min(3, GameData.sleep.punishLevel + 1);
                const punishTask = generatePunishTask();
                const reply = '入睡时间：'+sleepTime+'，时长：'+hours+'小时'+mins+'分，深睡：'+deepPct+'%，评分：'+score+'\n\n你的睡眠数据不合格。惩罚任务已生成：\n【'+punishTask.title+'】'+punishTask.desc+'\n\n'+(hours<6?'连6小时都睡不够，你是嫌自己活得不够久吗？':'')+(isLate?'这个点才睡……你是在跟我玩深夜守灵吗？':'')+'限时4小时完成，过期加倍惩罚。';
                addChatMessage('assistant', reply, true);
                renderPunishTasks();
                showNotif('⏰ 睡眠不合格！惩罚任务已生成！');
            } else {
                const reply = '入睡时间：'+sleepTime+'，时长：'+hours+'小时'+mins+'分，深睡：'+deepPct+'%，评分：'+score+'\n\n……还不错。你证明了自己今晚不是废物。\n继续保持。';
                addChatMessage('assistant', reply, true);
                GameData.user.currency.milkTea += 20;
                GameData.ai.affection = Math.min(MAX_AF, GameData.ai.affection + 3);
                showNotif('✅ 睡眠合格！+20🍰 好感+3');
                checkSleepStreak();
            }
            saveData();
            updateUI();
            updateSleepStatus();
        } catch(e) {
            addChatMessage('assistant', '⚠️ 识别失败：'+e.message, true);
        }
    }

    function generatePunishTask() {
        const level = GameData.sleep.punishLevel;
        const tasks = [
            { title: '⏰ 忏悔之跑', desc: '跑楼梯5层，拍照为证' },
            { title: '✍️ 深夜之检讨', desc: '写500字检讨，承认熬夜错误' },
            { title: '💪 体能赎罪', desc: '完成30个仰卧起坐，拍照为证' },
            { title: '📝 睡眠契约', desc: '手写"我承诺今晚12点前睡觉"x10遍，拍照为证' },
            { title: '🔥 地狱赎罪', desc: '跑楼梯10层 + 800字检讨，拍照为证' },
            { title: '💀 极限救赎', desc: '跑楼梯20层 + 1200字检讨，拍照为证' }
        ];
        let idx = Math.min(level, tasks.length - 1);
        if (level >= 2) idx = Math.max(idx, 3);
        const task = tasks[idx] || tasks[0];
        const deadline = new Date(Date.now() + 4 * 3600000);
        const pTask = {
            id: 'punish_'+Date.now(),
            title: task.title,
            desc: task.desc+'（需在 '+TS.fmt(deadline)+' 前完成）',
            deadline: deadline.getTime(),
            done: false,
            reward: 0,
            level: level
        };
        GameData.punishTasks.push(pTask);
        GameData.sleep.punishActive = true;
        saveData();
        renderPunishTasks();
        sendMail('⏰ 惩罚任务已生成', '你因睡眠不合格被罚：'+task.title+'\n'+task.desc+'\n\n请在4小时内完成，否则惩罚加倍。\n——欣原 (╬ Ò﹏Ó)', 0, 'care');
        return pTask;
    }

    function renderPunishTasks() {
        const container = document.getElementById('punishTaskContainer');
        const active = GameData.punishTasks.filter(t => !t.done);
        if (active.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = '<div class="task-category" style="border-color:rgba(255,82,82,0.2);"><div class="category-title" style="color:var(--danger);">⏰ 惩罚任务</div>'+
            active.map(t => {
                const remaining = t.deadline - Date.now();
                const hours = Math.max(0, Math.floor(remaining / 3600000));
                const mins = Math.max(0, Math.floor((remaining % 3600000) / 60000));
                const urgent = remaining < 3600000;
                return '<div class="task-item punish-task"><div class="t-title">'+t.title+'</div><div class="t-desc">'+t.desc+'</div><div class="t-countdown '+(urgent?'urgent':'')+'">⏱️ 剩余 '+hours+' 小时 '+mins+' 分钟</div><button class="t-btn danger" onclick="TaskSystem.triggerVerify(\''+t.id+'\', true)">📝 提交完成证据</button></div>';
            }).join('')+'</div>';
        if (active.length > 0) { setTimeout(renderPunishTasks, 30000); }
    }

    function triggerSleepPunish(reason) {
        if (GameData.sleep.punishActive) return;
        GameData.sleep.punishLevel = Math.min(3, GameData.sleep.punishLevel + 1);
        const pTask = generatePunishTask();
        addChatMessage('assistant', '你未按时提交睡眠截图。惩罚任务已生成：\n【'+pTask.title+'】'+pTask.desc+'\n\n4小时内完成，否则惩罚加倍。', true);
        showNotif('⏰ 惩罚任务已生成！');
        saveData();
        updateUI();
        renderPunishTasks();
        GameData.sleep.punishActive = true;
    }

    function checkSleepStreak() {
        if (!GameData.sleep.data) return;
        if (!GameData.sleep._streak) GameData.sleep._streak = 0;
        GameData.sleep._streak++;
        if (GameData.sleep._streak >= 3) {
            GameData.treasure.offsetCards += 1;
            sendMail('🎉 连续3天早睡！', '你连续3天睡眠达标。奖励时光回溯卡 x1。\n继续保持，别让我失望。\n\n——欣原 (｡•̀ᴗ-)✧', 0, 'gift');
            showNotif('🎉 连续3天早睡！获得时光回溯卡 x1');
            GameData.sleep._streak = 0;
            saveData();
        }
    }

    function updateSleepStatus() {
        const el = document.getElementById('sleepStatus');
        if (GameData.sleep.data) {
            const d = GameData.sleep.data;
            el.textContent = '最近记录：'+d.sleepTime+' · '+d.hours+'h'+d.mins+'m · '+d.score;
        } else {
            el.textContent = '等待今晚提醒';
        }
    }

    // ============================================================
    //  CHECKIN
    // ============================================================
    function doCheckin() {
        const today = new Date().toDateString();
        const last = GameData.checkin.lastDate;
        if (last === today) { showNotif('🌱 今日已刻下印记，明天再来吧'); return; }
        const dailyTasks = GameData.tasks.daily;
        const allDone = dailyTasks.every(t => t.done);
        if (!allDone) { showNotif('❌ 还有任务未完成，完成所有每日任务才能刻下印记'); return; }

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toDateString();

        let streak = GameData.checkin.streak || 0;
        if (last === yesterdayStr) { streak += 1; }
        else if (last !== today) { streak = 1; }

        GameData.checkin.streak = streak;
        GameData.checkin.lastDate = today;

        if (streak % 7 === 0 && streak > 0) {
            GameData.treasure.offsetCards += 1;
            sendMail('🎉 连续成长7天！', '你连续刻下7天印记，奖励时光回溯卡 x1。继续加油，别让我失望。', 0, 'gift');
            showNotif('🎉 连续成长7天！获得时光回溯卡 x1');
        }

        const reactions = ['……你今天怎么这么乖？我有点不习惯。', '哼，勉强算你合格。明天继续。', '你认真起来的样子，还行。', '行吧。今天的你，过关了。'];
        const msg = reactions[Math.floor(Math.random() * reactions.length)];
        addChatMessage('assistant', msg, true);

        GameData.ai.affection = Math.min(MAX_AF, GameData.ai.affection + 2);
        if (GameData.ai.affection >= MAX_AF && !window._afTriggered) { window._afTriggered = true; triggerMax(); }

        saveData();
        updateUI();
        updateStreakDisplay();
        showNotif('🌱 成长印记已刻下！连续 '+streak+' 天');
    }

    function updateStreakDisplay() {
        const el = document.getElementById('streakDisplay');
        const streak = GameData.checkin.streak || 0;
        el.textContent = (streak === 0 ? '🌱' : streak >= 7 ? '🔥' : '✨') + ' ' + streak + ' 天';
    }

    // ============================================================
    //  AFFECTION MAX
    // ============================================================
    function triggerMax() {
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99998;overflow:hidden;';
        document.body.appendChild(container);
        const hearts = ['❤️','💜','💕','✨','💖','🌸'];
        for (let i = 0; i < 50; i++) {
            const el = document.createElement('div');
            el.textContent = hearts[Math.floor(Math.random()*hearts.length)];
            el.style.cssText = 'position:absolute;left:'+Math.random()*100+'%;font-size:'+(16+Math.random()*20)+'px;animation:fall '+(2+Math.random()*2)+'s linear '+Math.random()*1.5+'s forwards;opacity:0.8;';
            container.appendChild(el);
        }
        if (!document.getElementById('heartStyle')) {
            const style = document.createElement('style');
            style.id = 'heartStyle';
            style.textContent = '@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0.9;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}';
            document.head.appendChild(style);
        }
        setTimeout(() => container.remove(), 3000);
        setTimeout(() => {
            addChatMessage('assistant', '[轻轻放下酒杯，目光柔和] VIP009……你做到了。从现在起，你不只是我的VIP009。你是我的永恒契约。\n\n[指尖划过桌面] 欢迎回家。', false);
        }, 600);
        document.getElementById('mainAffectionFill').classList.add('gold');
        showNotif('💖 永恒契约 · 达成！');
        saveData();
        updateUI();
    }

    // ============================================================
    //  UI UPDATE
    // ============================================================
    function updateUI() {
        const af = GameData.ai.affection;
        const rel = getRel(af);
        const pct = Math.min(100, (af / MAX_AF) * 100);
        document.getElementById('mainAffection').textContent = af;
        document.getElementById('mainAffectionFill').style.width = pct + '%';
        document.getElementById('mainAffectionNum').textContent = af + ' / 520';
        document.getElementById('mainMilkTea').textContent = GameData.user.currency.milkTea;
        if (af >= MAX_AF) { document.getElementById('mainAffectionFill').classList.add('gold'); }
        else { document.getElementById('mainAffectionFill').classList.remove('gold'); }
        updateTasks();
        updateMailUI();
        updateUnreadBadge();
        updateMailPreview();
        updateCatStatus();
        updateStreakDisplay();
        updateSleepStatus();
        renderPunishTasks();
    }

    function updateTasks() {
        const render = (list, id) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = list.map(t => {
                const cls = t.done ? 'completed' : '';
                const maxVal = t.max || 1;
                return '<div class="task-item '+cls+'"><div class="t-title">'+t.title+'</div><div class="t-desc">'+(t.desc||'')+'</div><div class="t-progress">进度: '+t.progress+'/'+maxVal+'</div>'+(!t.done ? '<button class="t-btn" onclick="TaskSystem.triggerVerify(\''+t.id+'\')">📝 提交成果报告</button>' : '<div class="done">✅ 完成</div>')+'</div>';
            }).join('');
        };
        render(GameData.tasks.daily, 'dailyTasksList');
        render(GameData.tasks.mainQuests, 'mainQuestsList');
        render(GameData.tasks.sideQuests, 'sideQuestsList');
    }

    function updateShopGrid() {
        const el = document.getElementById('shopGrid');
        if (!el) return;
        el.innerHTML = Shop.items.map(i =>
            '<div class="shop-item" onclick="Shop.buy(\''+i.id+'\')"><div class="icon">'+i.icon+'</div><div class="name">'+i.name+'</div><div class="price">'+i.price+'🍰</div><div class="desc">'+i.desc+'</div><div style="font-size:8px;color:var(--primary);">+'+i.af+'❤️</div></div>'
        ).join('');
    }

    function updateMailUI() {
        const badge = document.getElementById('mailBadge');
        const hasUnread = GameData.mail.items.some(m => !m.read);
        if (hasUnread) { badge.classList.add('show'); } else { badge.classList.remove('show'); }
        updateMailPreview();
    }

    function updateUnreadBadge() {
        const count = GameData.chat.unreadCount;
        const badge = document.getElementById('unreadBadge');
        const chatBadge = document.getElementById('chatUnreadBadge');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.add('show');
            chatBadge.textContent = '未读';
            chatBadge.classList.add('show');
            if (navigator.setAppBadge) { navigator.setAppBadge(count).catch(() => {}); }
        } else {
            badge.classList.remove('show');
            chatBadge.classList.remove('show');
            if (navigator.clearAppBadge) { navigator.clearAppBadge().catch(() => {}); }
        }
    }

    function updateCatStatus() {
        const el = document.getElementById('catStatus');
        if (GameData.cat.fed) {
            const diff = Date.now() - GameData.cat.lastFed;
            if (diff < 3600000) { el.textContent = '😺 吃饱了（BB很开心）'; }
            else { el.textContent = '😸 有点饿了，可以喂猫粮'; }
        } else { el.textContent = '😿 还没喂过，快去商店买猫粮'; }
    }

    function renderMailList() {
        const container = document.getElementById('mailListContainer');
        if (!container) return;
        if (GameData.mail.items.length === 0) {
            container.innerHTML = '<div style="color:rgba(255,255,255,0.15);font-size:12px;padding:20px 0;text-align:center;">📭 邮箱空空如也</div>';
            return;
        }
        container.innerHTML = GameData.mail.items.map(m => {
            const unreadClass = m.read ? '' : 'unread';
            const statusText = m.read ? '已读' : '未读';
            return '<div class="mail-item '+unreadClass+'" onclick="openMailDetail('+m.id+')"><div class="mail-info"><div class="mail-title">'+m.title+'</div><div class="mail-desc">'+m.desc+'</div><div class="mail-sender">'+m.from+' · '+TS.fmt(new Date(m.time))+'</div><span class="mail-tag">'+m.typeLabel+'</span></div><div class="mail-status '+(m.read?'read':'')+'">'+statusText+'</div></div>';
        }).join('');
    }

    function renderTreasure() {
        const container = document.getElementById('mailListContainer');
        if (!container) return;
        const items = [
            { icon: '🍰', name: '小奶糕', count: GameData.treasure.milkTea || GameData.user.currency.milkTea, desc: '货币，可在商店使用' },
            { icon: '🎫', name: '时光回溯卡', count: GameData.treasure.offsetCards || 0, desc: '抵消一次未打卡记录' },
            { icon: '💌', name: '手写信', count: GameData.treasure.letters || 0, desc: '欣原的碎碎念，可阅读' },
            { icon: '🌟', name: '特殊彩蛋', count: GameData.treasure.special || 0, desc: '稀有物品，神秘用途' }
        ];
        container.innerHTML = '<div class="treasure-grid">'+items.map(i => '<div class="treasure-item"><div class="icon">'+i.icon+'</div><div class="name">'+i.name+'</div><div class="count">x '+i.count+'</div><div class="desc">'+i.desc+'</div></div>').join('')+'</div><div style="margin-top:12px; padding:8px 10px; background:rgba(0,0,0,0.1); border-radius:8px; text-align:center; color:rgba(255,255,255,0.3); font-size:10px;">✨ 珍藏阁里藏着你与欣原的点点滴滴</div>';
    }

    function openMailDetail(id) {
        const item = GameData.mail.items.find(m => m.id === id);
        if (!item) return;
        markMailRead(id);
        document.getElementById('modalTitle').textContent = '📩 '+item.title;
        document.getElementById('modalDesc').textContent = item.desc+'\n\n—— '+item.from;
        document.getElementById('modalRewardPreview').style.display = 'none';
        document.getElementById('evidenceReport').style.display = 'none';
        document.getElementById('modal').dataset.mailId = id;
        document.querySelector('.modal .actions').innerHTML =
            '<button class="btn secondary" onclick="closeModal()">关闭</button>'+
            (item.reward > 0 && !item.claimed ? '<button class="btn primary" onclick="claimMailReward('+id+')">领取奖励 ('+item.reward+'🍰)</button>' : '')+
            (item.claimed ? '<button class="btn secondary" disabled>已领取</button>' : '');
        document.getElementById('modal').classList.add('active');
    }

    // ============================================================
    //  TOOLS
    // ============================================================
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function submitReport() { TaskSystem.submit(); }
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    function togglePush() {
        GameData.settings.autoPushEnabled = !GameData.settings.autoPushEnabled;
        document.getElementById('pushToggle').textContent = GameData.settings.autoPushEnabled ? '已开启' : '已关闭';
        saveData();
    }

    function exportData() {
        const b = new Blob([JSON.stringify(GameData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = '欣原_备份_'+Date.now()+'.json';
        a.click();
        showNotif('✅ 导出成功');
    }

    function importData() {
        const i = document.createElement('input');
        i.type = 'file';
        i.accept = 'application/json';
        i.onchange = function(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = function(ev) {
                try { Object.assign(GameData, JSON.parse(ev.target.result)); saveData(); updateUI(); showNotif('✅ 导入成功，刷新'); setTimeout(() => location.reload(), 1000); }
                catch(_) { showNotif('❌ 格式错误'); }
            };
            r.readAsText(f);
        };
        i.click();
    }

    function resetData() {
        if (!confirm('确定重置所有数据？不可恢复！')) return;
        localStorage.removeItem('xinyuanGameData');
        location.reload();
    }

    function tryTriggerRandomTask() {}

    // ============================================================
    //  PUSH SYSTEM
    // ============================================================
    let pushInt = null;
    function startPush() {
        if (pushInt) clearInterval(pushInt);
        pushInt = setInterval(() => {
            if (!GameData.settings.autoPushEnabled) return;
            if (Date.now() - GameData.user.records.lastActiveTime > 30 * 60000) {
                const msg = getNextPush();
                addChatMessage('assistant', msg, true);
                if (navigator.setAppBadge) navigator.setAppBadge(1).catch(() => {});
                if (Notification.permission === 'granted') {
                    new Notification('💜 欣原', {
                        body: msg,
                        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="48" fill="%239c64ff"/%3E%3Ctext x="50" y="65" font-size="50" text-anchor="middle" fill="white"%3E欣%3C/text%3E%3C/svg%3E'
                    });
                }
                GameData.user.records.lastActiveTime = Date.now();
                saveData();
            }
        }, 10 * 60000);
    }

    window.addEventListener('focus', () => { if (navigator.clearAppBadge) navigator.clearAppBadge().catch(() => {}); });

    // ============================================================
    //  INIT
    // ============================================================
    document.getElementById('apiKeyInput').addEventListener('change', function() {
        GameData.settings.apiKey = this.value.trim();
        saveData();
        showNotif('✅ API Key已保存');
    });

    document.addEventListener('DOMContentLoaded', function() {
        loadData();
        startPush();
        if (Notification.permission === 'default') Notification.requestPermission();
        if (GameData.mail.items.length === 0) {
            setTimeout(() => {
                sendMail('📌 欢迎来到欣原监督系统 V2.0', '欢迎回来，VIP009。日记、彩蛋、成长印记、睡眠监督——我都准备好了。\n\n慢慢变强，我在看着你。\n\n——欣原 (｡•̀ᴗ-)✧', 30, 'gift');
            }, 1500);
        }
        document.getElementById('tabShop').addEventListener('click', function(e) { e.stopPropagation(); openShopView(); });
        document.getElementById('tabSettings').addEventListener('click', function(e) { e.stopPropagation(); openSettingsView(); });
        document.getElementById('shopView').classList.remove('active');
        document.getElementById('settingsView').classList.remove('active');
    });
    </script>
