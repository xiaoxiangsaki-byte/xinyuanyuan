<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欣原 · Elite Supervisor 5.7</title>
    <style>
        :root { --primary: #b388ff; --danger: #ff5252; --bg: #050208; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'STSong', serif; }
        body { background: #050208; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
        
        /* 导航栏加固：必须最高层级且始终固定 */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px; 
            background: #000; border-top: 1px solid rgba(179,136,255,0.2); 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 99999 !important; /* 强制覆盖所有元素 */
        }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* 输入区加固 */
        .input-wrapper { 
            position: fixed; bottom: 70px; left: 0; right: 0; 
            background: rgba(10, 6, 18, 0.95); padding: 10px 15px;
            display: flex; gap: 10px; border-top: 1px solid rgba(179,136,255,0.1);
        }

        .container { padding-bottom: 150px; }
        .chat-box { height: calc(100vh - 250px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 其他样式保持不变，确保结构稳固 */
        .header { background: #000; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; }
        .tab-page { display: none; }
        .tab-page.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div><span>FINANCE</span><strong id="milkTea">0</strong></div>
        <div><span>STREAK</span><strong id="streak">0</strong></div>
        <div><span>FAVOR</span><strong id="love">0</strong></div>
        <div><span>MOOD</span><strong id="moodStat">100</strong></div>
    </div>

    <div class="container">
        <div id="homePage" class="tab-page active">
            <div class="chat-box" id="chatBox"></div>
        </div>
        <div id="taskPage" class="tab-page" style="display:none; padding:15px;"><div id="taskList"></div></div>
        <div id="settingPage" class="tab-page" style="display:none; padding:15px;"><input type="text" id="apiKeyIn" placeholder="粘贴API Key" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333;"><button onclick="saveKey()" style="width:100%; margin-top:10px; padding:10px; background:var(--primary);">激活</button></div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="chatInput" placeholder="汇报..." style="flex:1; background:none; border:none; color:#fff; outline:none;">
        <button onclick="handleSend()" style="background:none; border:none; color:var(--primary); cursor:pointer;">➤</button>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i>🏠</i>Home</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('task', this)"><i>📋</i>Task</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('setting', this)"><i>⚙️</i>Set</a>
    </nav>

<script>
// ... (之前的逻辑代码保持不变，确保 ID 匹配) ...
// 关键修正：确保点击 nav-item 后，输入框不遮挡导航
function navTo(p, el) {
    document.querySelectorAll('.tab-page').forEach(x => x.style.display = 'none');
    document.getElementById(p + 'Page').style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    // 如果是 Task 或 Set，隐藏输入框
    document.querySelector('.input-wrapper').style.display = (p === 'home') ? 'flex' : 'none';
}
// ...
</script>
</body>
</html>
